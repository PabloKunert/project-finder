<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidRoute — StreetBond 120 Government Bid Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1B1D1E;
    --asphalt-2:#26292A;
    --asphalt-3:#323637;
    --concrete:#EDEAE2;
    --concrete-2:#E2DED2;
    --route-green:#0B5D3B;
    --route-green-2:#147A4C;
    --sign-yellow:#FFC629;
    --line-white:#F7F5EF;
    --deadline-red:#B3261E;
    --ink:#1B1D1E;
    --muted:#6B6F70;
    --radius:10px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--concrete);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .brandfont{ font-family:'Overpass', sans-serif; }
  .monofont{ font-family:'IBM Plex Mono', monospace; }

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--asphalt);
    color:var(--line-white);
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:4px solid var(--sign-yellow);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    letter-spacing:0.06em;
    font-size:18px;
    text-transform:uppercase;
  }
  .brand svg{ width:26px; height:26px; flex-shrink:0; }
  .saved-toggle{
    background:transparent;
    border:1.5px solid rgba(247,245,239,0.35);
    color:var(--line-white);
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .saved-toggle:hover{ border-color:var(--sign-yellow); }
  .saved-toggle.active{ background:var(--sign-yellow); color:var(--asphalt); border-color:var(--sign-yellow); }
  .saved-toggle:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible{
    outline:3px solid var(--sign-yellow);
    outline-offset:2px;
  }

  /* ---------- Hero / sign panel ---------- */
  .hero{
    background:var(--asphalt);
    padding:36px 24px 64px;
  }
  .sign{
    max-width:880px;
    margin:0 auto;
    background:var(--route-green);
    border:3px solid var(--line-white);
    border-radius:14px;
    padding:28px 28px 24px;
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
  }
  .sign-eyebrow{
    margin:0 0 4px;
    color:var(--sign-yellow);
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
  }
  .sign h1{
    margin:0 0 20px;
    color:var(--line-white);
    font-family:'Overpass', sans-serif;
    font-weight:800;
    font-size:clamp(24px, 4vw, 34px);
    letter-spacing:0.01em;
  }
  .search-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .search-row input[type="text"],
  .search-row select{
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:12px 14px;
    border-radius:8px;
    border:none;
    background:var(--line-white);
    color:var(--ink);
  }
  #queryInput{ flex:2 1 220px; font-weight:600; }
  #locationInput{ width:100%; }
  #levelSelect{ flex:1 1 150px; cursor:pointer; }
  .go-btn{
    flex:0 0 auto;
    background:var(--sign-yellow);
    color:var(--asphalt);
    border:none;
    font-family:'Overpass', sans-serif;
    font-weight:800;
    font-size:14px;
    letter-spacing:0.08em;
    padding:0 26px;
    border-radius:8px;
    cursor:pointer;
    clip-path:polygon(12% 0%, 100% 0%, 100% 100%, 12% 100%, 0% 50%);
    padding-left:32px;
    transition:transform 0.1s ease, background 0.15s ease;
  }
  .go-btn:hover{ background:#FFD75E; }
  .go-btn:active{ transform:scale(0.97); }
  .go-btn:disabled{ opacity:0.6; cursor:wait; }

  .disclaimer{
    max-width:880px;
    margin:14px auto 0;
    color:rgba(247,245,239,0.6);
    font-size:12px;
    line-height:1.5;
  }

  /* ---------- Results section ---------- */
  .results-section{
    max-width:880px;
    margin:0 auto;
    padding:28px 24px 80px;
  }
  .status-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
    min-height:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .scan{
    width:16px; height:16px;
    border-radius:50%;
    border:2px solid var(--muted);
    border-top-color:var(--route-green);
    animation:spin 0.8s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .scan{ animation:none; }
    .card{ animation:none !important; }
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .results-list{ display:flex; flex-direction:column; gap:14px; }

  .card{
    background:#fff;
    border:1px solid var(--concrete-2);
    border-left:5px solid var(--route-green);
    border-radius:var(--radius);
    padding:18px 20px;
    animation:rise 0.25s ease both;
  }
  .card.status-closed{ border-left-color:var(--muted); opacity:0.75; }
  .card.status-closing_soon{ border-left-color:var(--sign-yellow); }
  .card.status-unknown{ border-left-color:var(--muted); }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:8px;
  }
  .badge{
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:999px;
    color:#fff;
    background:var(--muted);
    white-space:nowrap;
  }
  .badge.open{ background:var(--route-green); }
  .badge.closing_soon{ background:var(--sign-yellow); color:var(--ink); }
  .badge.closed{ background:var(--muted); }

  .agency{
    font-size:13px;
    color:var(--muted);
    font-weight:500;
  }
  .card h3{
    margin:2px 0 8px;
    font-family:'Overpass', sans-serif;
    font-size:17px;
    font-weight:700;
    line-height:1.3;
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--ink);
    margin-bottom:10px;
  }
  .meta-row span b{ color:var(--muted); font-weight:500; margin-right:4px; font-family:'Inter',sans-serif; }
  .snippet{
    font-size:13.5px;
    color:#3A3D3E;
    line-height:1.5;
    margin:0 0 14px;
  }
  .card-actions{
    display:flex;
    gap:10px;
  }
  .card-actions a, .card-actions button{
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:12.5px;
    letter-spacing:0.03em;
    padding:8px 14px;
    border-radius:7px;
    text-decoration:none;
    cursor:pointer;
    border:1.5px solid var(--asphalt);
  }
  .view-link{ background:var(--asphalt); color:var(--line-white); }
  .view-link:hover{ background:var(--asphalt-2); }
  .save-btn{ background:#fff; color:var(--asphalt); }
  .save-btn.saved{ background:var(--sign-yellow); border-color:var(--sign-yellow); }

  .empty-state, .error-state{
    background:#fff;
    border:1.5px dashed var(--concrete-2);
    border-radius:var(--radius);
    padding:32px 24px;
    text-align:center;
    color:var(--muted);
  }
  .error-state{ border-color:var(--deadline-red); color:var(--deadline-red); }
  .empty-state h3, .error-state h3{
    font-family:'Overpass', sans-serif;
    color:var(--ink);
    margin:0 0 6px;
  }
  .error-state h3{ color:var(--deadline-red); }

  footer{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    padding:0 24px 40px;
  }

  @media (max-width:480px){
    .search-row{ flex-direction:column; }
    #queryInput, #locationInput, #levelSelect, .go-btn{ flex:1 1 auto; width:100%; }
    .go-btn{ clip-path:none; padding-left:26px; }
  }

  /* ---------- Location autocomplete ---------- */
  .ac-wrap{ position:relative; }
  .ac-drop{
    position:absolute;
    top:calc(100% + 4px);
    left:0; right:0;
    z-index:200;
    background:#fff;
    border:1.5px solid var(--concrete-2);
    border-radius:8px;
    list-style:none;
    margin:0; padding:0;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height .14s ease, opacity .1s ease;
    pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.10);
  }
  .ac-drop.open{
    max-height:272px;
    opacity:1;
    overflow-y:auto;
    pointer-events:all;
  }
  .ac-item{
    padding:9px 13px;
    font-family:'Inter', sans-serif;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    border-bottom:1px solid var(--concrete-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ac-item:last-child{ border-bottom:none; }
  .ac-item:hover,.ac-item.hi{
    background:rgba(11,93,59,.07);
    color:var(--route-green);
  }
  .ac-item .ac-sub{
    font-size:11px;
    color:var(--muted);
    margin-left:6px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L22 8 V16 L12 22 L2 16 V8 Z" stroke="#F7F5EF" stroke-width="2" fill="#0B5D3B"/><path d="M12 8v8M8 12h8" stroke="#FFC629" stroke-width="2"/></svg>
    BidRoute
  </div>
  <button class="saved-toggle" id="savedToggle">☆ Saved (<span id="savedCount">0</span>)</button>
</div>

<div class="hero">
  <div class="sign">
    <p class="sign-eyebrow">Next Exit</p>
    <h1>Government Bid Leads</h1>
    <form class="search-row" id="searchForm">
      <input type="text" id="queryInput" value="StreetBond 120" aria-label="Product or search term" autocomplete="off">
      <div class="ac-wrap" style="flex:1 1 160px">
        <input type="text" id="locationInput" placeholder="State or city" aria-label="Location filter" autocomplete="off" style="width:100%">
      </div>
      <select id="levelSelect" aria-label="Government level">
        <option value="all">All levels</option>
        <option value="federal">Federal</option>
        <option value="state">State / DOT</option>
        <option value="municipal">Municipal / County</option>
      </select>
      <button type="submit" class="go-btn" id="goBtn">GO</button>
    </form>
  </div>
  <p class="disclaimer">Results are pulled live via web search and summarized — always confirm scope, dates, and value on the official solicitation before bidding.</p>
</div>

<div class="results-section">
  <div class="status-line" id="statusLine"></div>
  <div class="results-list" id="resultsList"></div>
</div>

<footer>BidRoute · live search, not affiliated with any bid platform or agency.</footer>

<script>
  // Replace with the URL shown after running: npx wrangler deploy (in bizztrip/proxy/)
  const PROXY_URL = "https://gh-pages-proxy.pablo-kunert.workers.dev";

  const SYSTEM_PROMPT = `You are a procurement research assistant. Your job is to find REAL, CURRENTLY OPEN OR RECENTLY POSTED government contract opportunities, RFPs, ITBs, or bid solicitations that specifically call for, specify, or reference the product/material the user names.

Search live using web search across these primary sources:
- SAM.gov (federal)
- State DOT bid-letting portals (CALTRANS, TxDOT, FDOT, etc.)
- VendorLine / PlanetBids (vendorline.com / planetbids.com) — government bid board for public agencies
- Crisp Plan Room (crispplanroom.com) — California school districts and public works plan room
- SecureBids (securebids.com) — public agency secure bid submission platform
- Municipal and county procurement portals
- BidNet, PublicPurchase, DemandStar

Rules:
- Only include opportunities you actually found via search. Never invent agencies, projects, or URLs.
- Prefer opportunities that are currently open for bidding. Include recently closed ones only if nothing open is found, and mark status accordingly.
- Each result must include a real sourceUrl found via search.
- Keep each snippet under 20 words.
- Return at most 6 results.
- Respond with ONLY raw JSON, no markdown code fences, no commentary before or after, matching exactly this schema:
{"results":[{"title":"string","agency":"string","location":"string","status":"open|closing_soon|closed|unknown","deadline":"string or empty","estimatedValue":"string or empty","sourceUrl":"string","snippet":"string"}],"note":"string, only include if results is empty, explaining what was searched"}`;

  function buildUserPrompt(query, location, level){
    const levelText = level === 'all' ? '' : ` at the ${level} government level`;
    const locText = location ? ` in ${location}` : ' anywhere in the United States';
    return `Find current government construction or procurement bid opportunities${levelText} that specify or reference "${query}"${locText}. Use web search now and return only the JSON schema described.`;
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function slugId(str){
    let h = 0;
    const s = String(str || '');
    for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
    return 'p' + Math.abs(h).toString(36);
  }

  function extractJson(text){
    let t = text.trim();
    t = t.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const start = t.indexOf('{');
    const end = t.lastIndexOf('}');
    if(start >= 0 && end > start){ t = t.substring(start, end+1); }
    return JSON.parse(t);
  }

  const statusLabels = { open:'Open', closing_soon:'Closing soon', closed:'Closed', unknown:'Status unknown' };

  let lastResults = [];
  let savedMap = {};
  let viewingSaved = false;

  function loadSaved(){
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('bidroute:saved:')){
        try{
          const id = key.replace('bidroute:saved:', '');
          savedMap[id] = JSON.parse(localStorage.getItem(key));
        }catch(e){}
      }
    }
    updateSavedCount();
  }

  function updateSavedCount(){
    document.getElementById('savedCount').textContent = Object.keys(savedMap).length;
  }

  function toggleSave(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    if(savedMap[id]){
      delete savedMap[id];
      localStorage.removeItem('bidroute:saved:' + id);
    } else {
      savedMap[id] = project;
      try{ localStorage.setItem('bidroute:saved:' + id, JSON.stringify(project)); }catch(e){
        console.error('Could not save lead', e);
      }
    }
    updateSavedCount();
    render(viewingSaved ? Object.values(savedMap) : lastResults);
  }

  function cardHtml(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    const status = (project.status || 'unknown');
    const label = statusLabels[status] || 'Status unknown';
    const isSaved = !!savedMap[id];
    return `
      <div class="card status-${escapeHtml(status)}">
        <div class="card-top">
          <span class="agency">${escapeHtml(project.agency || 'Agency not specified')}</span>
          <span class="badge ${escapeHtml(status)}">${escapeHtml(label)}</span>
        </div>
        <h3>${escapeHtml(project.title || 'Untitled solicitation')}</h3>
        <div class="meta-row">
          <span><b>Location</b>${escapeHtml(project.location || '—')}</span>
          <span><b>Deadline</b>${escapeHtml(project.deadline || '—')}</span>
          <span><b>Est. value</b>${escapeHtml(project.estimatedValue || '—')}</span>
        </div>
        <p class="snippet">${escapeHtml(project.snippet || '')}</p>
        <div class="card-actions">
          ${project.sourceUrl ? `<a class="view-link" href="${escapeHtml(project.sourceUrl)}" target="_blank" rel="noopener noreferrer">View solicitation ↗</a>` : ''}
          <button class="save-btn ${isSaved ? 'saved' : ''}" data-id="${id}">${isSaved ? '★ Saved' : '☆ Save'}</button>
        </div>
      </div>`;
  }

  function render(list){
    const container = document.getElementById('resultsList');
    if(!list || list.length === 0){
      container.innerHTML = viewingSaved
        ? `<div class="empty-state"><h3>No saved leads yet</h3><p>Save a result and it'll show up here.</p></div>`
        : `<div class="empty-state"><h3>No matching opportunities found</h3><p>Try a broader location, a different government level, or check back later — new solicitations post daily.</p></div>`;
      return;
    }
    container.innerHTML = list.map(cardHtml).join('');
    container.querySelectorAll('.save-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-id');
        const project = (viewingSaved ? Object.values(savedMap) : lastResults).find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id) || savedMap[id];
        if(project) toggleSave(project);
      });
    });
  }

  function setStatus(html, spinning){
    document.getElementById('statusLine').innerHTML = (spinning ? '<span class="scan"></span>' : '') + html;
  }

  async function search(query, location, level){
    viewingSaved = false;
    document.getElementById('savedToggle').classList.remove('active');
    document.getElementById('goBtn').disabled = true;
    setStatus(`Searching state DOT, municipal, and federal bid boards for &ldquo;${escapeHtml(query)}&rdquo;&hellip;`, true);
    document.getElementById('resultsList').innerHTML = '';

    try{
      const response = await fetch(PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: [{ role: 'user', content: buildUserPrompt(query, location, level) }],
          tools: [{ type: 'web_search_20250305', name: 'web_search' }]
        })
      });

      if(!response.ok){
        throw new Error(`Search request failed (${response.status})`);
      }

      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
      if(!textBlocks.trim()){ throw new Error('No response text returned from search.'); }

      const parsed = extractJson(textBlocks);
      lastResults = parsed.results || [];

      if(lastResults.length === 0){
        setStatus(parsed.note ? escapeHtml(parsed.note) : 'No results found for this search.', false);
      } else {
        setStatus(`${lastResults.length} result${lastResults.length===1?'':'s'} found · sourced via live web search, ${new Date().toLocaleTimeString()}`, false);
      }
      render(lastResults);
    } catch(err){
      console.error(err);
      document.getElementById('resultsList').innerHTML = `<div class="error-state"><h3>Search didn't go through</h3><p>${escapeHtml(err.message || 'Something went wrong reaching the search service.')} Try again in a moment.</p></div>`;
      setStatus('Search failed.', false);
    } finally {
      document.getElementById('goBtn').disabled = false;
    }
  }

  document.getElementById('searchForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const query = document.getElementById('queryInput').value.trim() || 'StreetBond 120';
    const location = document.getElementById('locationInput').value.trim();
    const level = document.getElementById('levelSelect').value;
    search(query, location, level);
  });

  document.getElementById('savedToggle').addEventListener('click', ()=>{
    viewingSaved = !viewingSaved;
    document.getElementById('savedToggle').classList.toggle('active', viewingSaved);
    if(viewingSaved){
      setStatus(`Showing ${Object.keys(savedMap).length} saved lead${Object.keys(savedMap).length===1?'':'s'}`, false);
      render(Object.values(savedMap));
    } else {
      setStatus(lastResults.length ? `${lastResults.length} result${lastResults.length===1?'':'s'} found` : '', false);
      render(lastResults);
    }
  });

  loadSaved();
  search('StreetBond 120', '', 'all');

  /* ---- Location autocomplete ---- */
  const LOCATIONS = [
    // States
    {n:"Alabama",a:"AL"},{n:"Alaska",a:"AK"},{n:"Arizona",a:"AZ"},{n:"Arkansas",a:"AR"},
    {n:"California",a:"CA"},{n:"Colorado",a:"CO"},{n:"Connecticut",a:"CT"},{n:"Delaware",a:"DE"},
    {n:"Florida",a:"FL"},{n:"Georgia",a:"GA"},{n:"Hawaii",a:"HI"},{n:"Idaho",a:"ID"},
    {n:"Illinois",a:"IL"},{n:"Indiana",a:"IN"},{n:"Iowa",a:"IA"},{n:"Kansas",a:"KS"},
    {n:"Kentucky",a:"KY"},{n:"Louisiana",a:"LA"},{n:"Maine",a:"ME"},{n:"Maryland",a:"MD"},
    {n:"Massachusetts",a:"MA"},{n:"Michigan",a:"MI"},{n:"Minnesota",a:"MN"},{n:"Mississippi",a:"MS"},
    {n:"Missouri",a:"MO"},{n:"Montana",a:"MT"},{n:"Nebraska",a:"NE"},{n:"Nevada",a:"NV"},
    {n:"New Hampshire",a:"NH"},{n:"New Jersey",a:"NJ"},{n:"New Mexico",a:"NM"},{n:"New York",a:"NY"},
    {n:"North Carolina",a:"NC"},{n:"North Dakota",a:"ND"},{n:"Ohio",a:"OH"},{n:"Oklahoma",a:"OK"},
    {n:"Oregon",a:"OR"},{n:"Pennsylvania",a:"PA"},{n:"Rhode Island",a:"RI"},{n:"South Carolina",a:"SC"},
    {n:"South Dakota",a:"SD"},{n:"Tennessee",a:"TN"},{n:"Texas",a:"TX"},{n:"Utah",a:"UT"},
    {n:"Vermont",a:"VT"},{n:"Virginia",a:"VA"},{n:"Washington",a:"WA"},{n:"West Virginia",a:"WV"},
    {n:"Wisconsin",a:"WI"},{n:"Wyoming",a:"WY"},{n:"Washington D.C.",a:"DC"},
    // Cities
    {n:"Birmingham",a:"AL"},{n:"Huntsville",a:"AL"},{n:"Mobile",a:"AL"},{n:"Montgomery",a:"AL"},
    {n:"Anchorage",a:"AK"},{n:"Fairbanks",a:"AK"},

  function makeLocationAC(inputEl){
    const wrap = inputEl.parentElement;
    const drop = document.createElement('ul');
    drop.className = 'ac-drop';
    wrap.appendChild(drop);
    let activeIdx = -1, cur = [];

    const isState = loc => !loc.n.includes(',') && LOCATIONS.indexOf(loc) < 51;

    function query(q){
      const ql = q.toLowerCase();
      const starts = [], contains = [];
      for(const loc of LOCATIONS){
        const nl = loc.n.toLowerCase(), al = loc.a.toLowerCase();
        const match = nl.startsWith(ql) || al === ql || al.startsWith(ql);
        const cont  = !match && (nl.includes(ql));
        if(match) starts.push(loc);
        else if(cont) contains.push(loc);
      }
      return [...starts, ...contains].slice(0, 8);
    }

    function fill(loc){
      const state = LOCATIONS.slice(0,51).find(s => s.n === loc.n);
      if(state) return loc.n; // it's a state entry
      return loc.n + ', ' + loc.a;
    }

    function setActive(i){
      activeIdx = i;
      drop.querySelectorAll('.ac-item').forEach((el,idx)=>el.classList.toggle('hi',idx===i));
      const hi = drop.querySelectorAll('.ac-item')[i];
      if(hi) hi.scrollIntoView({block:'nearest'});
    }
    function close(){ drop.classList.remove('open'); activeIdx=-1; cur=[]; }
    function select(loc){ inputEl.value = fill(loc); close(); }

    function render(results){
      cur = results; activeIdx = -1; drop.innerHTML = '';
      if(!results.length){ close(); return; }
      results.forEach((loc,i)=>{
        const li = document.createElement('li');
        li.className = 'ac-item';
        const stateEntry = LOCATIONS.slice(0,51).find(s => s.n === loc.n);
        if(stateEntry){
          li.innerHTML = loc.n + ' <span class="ac-sub">' + loc.a + '</span>';
        } else {
          li.innerHTML = loc.n + ' <span class="ac-sub">' + loc.a + '</span>';
        }
        li.addEventListener('mousedown', e=>{ e.preventDefault(); select(loc); });
        li.addEventListener('mouseenter', ()=>setActive(i));
        drop.appendChild(li);
      });
      drop.classList.add('open');
    }

    inputEl.addEventListener('input',()=>{ const q=inputEl.value.trim(); if(q.length<1){close();return;} render(query(q)); });
    inputEl.addEventListener('focus',()=>{ const q=inputEl.value.trim(); if(q.length>=1) render(query(q)); });
    inputEl.addEventListener('blur',()=>setTimeout(close,150));
    inputEl.addEventListener('keydown',e=>{
      if(!drop.classList.contains('open')) return;
      const items=drop.querySelectorAll('.ac-item');
      if(e.key==='ArrowDown'){e.preventDefault();setActive(Math.min(activeIdx+1,items.length-1));}
      else if(e.key==='ArrowUp'){e.preventDefault();setActive(Math.max(activeIdx-1,0));}
      else if(e.key==='Enter'){if(activeIdx>=0&&cur[activeIdx]){e.preventDefault();select(cur[activeIdx]);}}
      else if(e.key==='Escape'){e.preventDefault();close();}
    });
  }

  makeLocationAC(document.getElementById('locationInput'));
