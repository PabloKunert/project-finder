<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidRoute — StreetBond 120 Government Bid Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --asphalt:#1B1D1E;
    --asphalt-2:#26292A;
    --asphalt-3:#323637;
    --concrete:#EDEAE2;
    --concrete-2:#E2DED2;
    --route-green:#0B5D3B;
    --route-green-2:#147A4C;
    --sign-yellow:#FFC629;
    --line-white:#F7F5EF;
    --deadline-red:#B3261E;
    --ink:#1B1D1E;
    --muted:#6B6F70;
    --radius:10px;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--concrete);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    min-height:100vh;
  }
  .brandfont{ font-family:'Overpass', sans-serif; }
  .monofont{ font-family:'IBM Plex Mono', monospace; }

  /* ---------- Top bar ---------- */
  .topbar{
    background:var(--asphalt);
    color:var(--line-white);
    padding:16px 24px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:4px solid var(--sign-yellow);
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:800;
    letter-spacing:0.06em;
    font-size:18px;
    text-transform:uppercase;
  }
  .brand svg{ width:26px; height:26px; flex-shrink:0; }
  .saved-toggle{
    background:transparent;
    border:1.5px solid rgba(247,245,239,0.35);
    color:var(--line-white);
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    padding:8px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .saved-toggle:hover{ border-color:var(--sign-yellow); }
  .saved-toggle.active{ background:var(--sign-yellow); color:var(--asphalt); border-color:var(--sign-yellow); }
  .saved-toggle:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible{
    outline:3px solid var(--sign-yellow);
    outline-offset:2px;
  }

  /* ---------- Hero / sign panel ---------- */
  .hero{
    background:var(--asphalt);
    padding:36px 24px 64px;
  }
  .sign{
    max-width:880px;
    margin:0 auto;
    background:var(--route-green);
    border:3px solid var(--line-white);
    border-radius:14px;
    padding:28px 28px 24px;
    box-shadow:0 18px 40px rgba(0,0,0,0.35);
  }
  .sign-eyebrow{
    margin:0 0 4px;
    color:var(--sign-yellow);
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
  }
  .sign h1{
    margin:0 0 20px;
    color:var(--line-white);
    font-family:'Overpass', sans-serif;
    font-weight:800;
    font-size:clamp(24px, 4vw, 34px);
    letter-spacing:0.01em;
  }
  .search-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
  }
  .search-row input[type="text"],
  .search-row select{
    font-family:'Inter', sans-serif;
    font-size:14px;
    padding:12px 14px;
    border-radius:8px;
    border:none;
    background:var(--line-white);
    color:var(--ink);
  }
  #queryInput{ flex:2 1 220px; font-weight:600; }
  #locationInput{ width:100%; }
  #levelSelect{ flex:1 1 150px; cursor:pointer; }
  .go-btn{
    flex:0 0 auto;
    background:var(--sign-yellow);
    color:var(--asphalt);
    border:none;
    font-family:'Overpass', sans-serif;
    font-weight:800;
    font-size:14px;
    letter-spacing:0.08em;
    padding:0 26px;
    border-radius:8px;
    cursor:pointer;
    clip-path:polygon(12% 0%, 100% 0%, 100% 100%, 12% 100%, 0% 50%);
    padding-left:32px;
    transition:transform 0.1s ease, background 0.15s ease;
  }
  .go-btn:hover{ background:#FFD75E; }
  .go-btn:active{ transform:scale(0.97); }
  .go-btn:disabled{ opacity:0.6; cursor:wait; }

  .disclaimer{
    max-width:880px;
    margin:14px auto 0;
    color:rgba(247,245,239,0.6);
    font-size:12px;
    line-height:1.5;
  }

  .chip-row{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:8px;
    margin-top:16px;
  }
  .chip-label{
    font-family:'Overpass', sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:rgba(247,245,239,0.55);
    margin-right:2px;
  }
  .chip{
    background:rgba(247,245,239,0.1);
    border:1px solid rgba(247,245,239,0.3);
    color:var(--line-white);
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    padding:6px 12px;
    border-radius:999px;
    cursor:pointer;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .chip:hover{ background:rgba(255,198,41,0.18); border-color:var(--sign-yellow); }

  /* ---------- Results section ---------- */
  .results-section{
    max-width:880px;
    margin:0 auto;
    padding:28px 24px 80px;
  }
  .status-line{
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    color:var(--muted);
    margin-bottom:6px;
    min-height:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .search-note{
    font-size:12.5px;
    color:var(--muted);
    font-style:italic;
    margin-bottom:18px;
    line-height:1.5;
  }
  .scan{
    width:16px; height:16px;
    border-radius:50%;
    border:2px solid var(--muted);
    border-top-color:var(--route-green);
    animation:spin 0.8s linear infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .scan{ animation:none; }
    .card{ animation:none !important; }
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .results-list{ display:flex; flex-direction:column; gap:14px; }

  .planrooms{
    background:#fff;
    border:1px solid var(--concrete-2);
    border-radius:var(--radius);
    padding:14px 18px;
    margin-bottom:18px;
  }
  .planrooms-label{
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin:0 0 10px;
  }
  .planroom-links{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .planroom-link{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:500;
    color:var(--ink);
    text-decoration:none;
    background:var(--concrete);
    border:1px solid var(--concrete-2);
    padding:7px 12px;
    border-radius:7px;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  .planroom-link:hover{ border-color:var(--route-green); background:#fff; }
  .planroom-link .tag{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.03em;
  }
  .planroom-link.deep .tag{ color:var(--route-green); }

  .card{
    background:#fff;
    border:1px solid var(--concrete-2);
    border-left:5px solid var(--route-green);
    border-radius:var(--radius);
    padding:18px 20px;
    animation:rise 0.25s ease both;
  }
  .card.status-closed{ border-left-color:var(--muted); opacity:0.75; }
  .card.status-closing_soon{ border-left-color:var(--sign-yellow); }
  .card.status-unknown{ border-left-color:var(--muted); }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:8px;
  }
  .badge{
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:999px;
    color:#fff;
    background:var(--muted);
    white-space:nowrap;
  }
  .badge.open{ background:var(--route-green); }
  .badge.closing_soon{ background:var(--sign-yellow); color:var(--ink); }
  .badge.closed{ background:var(--muted); }
  .badge.reference{ background:var(--asphalt-3); }
  .card.is-reference{ border-left-style:dashed; }

  .agency{
    font-size:13px;
    color:var(--muted);
    font-weight:500;
  }
  .card h3{
    margin:2px 0 8px;
    font-family:'Overpass', sans-serif;
    font-size:17px;
    font-weight:700;
    line-height:1.3;
  }
  .meta-row{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12.5px;
    color:var(--ink);
    margin-bottom:10px;
  }
  .meta-row span b{ color:var(--muted); font-weight:500; margin-right:4px; font-family:'Inter',sans-serif; }
  .snippet{
    font-size:13.5px;
    color:#3A3D3E;
    line-height:1.5;
    margin:0 0 14px;
  }
  .card-actions{
    display:flex;
    gap:10px;
  }
  .card-actions a, .card-actions button{
    font-family:'Overpass', sans-serif;
    font-weight:700;
    font-size:12.5px;
    letter-spacing:0.03em;
    padding:8px 14px;
    border-radius:7px;
    text-decoration:none;
    cursor:pointer;
    border:1.5px solid var(--asphalt);
  }
  .view-link{ background:var(--asphalt); color:var(--line-white); }
  .view-link:hover{ background:var(--asphalt-2); }
  .save-btn{ background:#fff; color:var(--asphalt); }
  .save-btn.saved{ background:var(--sign-yellow); border-color:var(--sign-yellow); }

  .empty-state, .error-state{
    background:#fff;
    border:1.5px dashed var(--concrete-2);
    border-radius:var(--radius);
    padding:32px 24px;
    text-align:center;
    color:var(--muted);
  }
  .error-state{ border-color:var(--deadline-red); color:var(--deadline-red); }
  .empty-state h3, .error-state h3{
    font-family:'Overpass', sans-serif;
    color:var(--ink);
    margin:0 0 6px;
  }
  .error-state h3{ color:var(--deadline-red); }

  footer{
    text-align:center;
    font-size:12px;
    color:var(--muted);
    padding:0 24px 40px;
  }

  @media (max-width:480px){
    .search-row{ flex-direction:column; }
    #queryInput, #locationInput, #levelSelect, .go-btn{ flex:1 1 auto; width:100%; }
    .go-btn{ clip-path:none; padding-left:26px; }
  }

  /* ---------- Location autocomplete ---------- */
  .ac-wrap{ position:relative; flex:1 1 160px; }
  .ac-drop{
    position:absolute;
    top:calc(100% + 4px);
    left:0; right:0;
    z-index:200;
    background:#fff;
    border:1.5px solid var(--concrete-2);
    border-radius:8px;
    list-style:none;
    margin:0; padding:0;
    max-height:0;
    overflow:hidden;
    opacity:0;
    transition:max-height .14s ease, opacity .1s ease;
    pointer-events:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.10);
  }
  .ac-drop.open{ max-height:272px; opacity:1; overflow-y:auto; pointer-events:all; }
  .ac-item{
    padding:9px 13px;
    font-family:'Inter', sans-serif;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    border-bottom:1px solid var(--concrete-2);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .ac-item:last-child{ border-bottom:none; }
  .ac-item:hover,.ac-item.hi{ background:rgba(11,93,59,.07); color:var(--route-green); }
  .ac-sub{ font-size:11px; color:var(--muted); margin-left:6px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 2 L22 8 V16 L12 22 L2 16 V8 Z" stroke="#F7F5EF" stroke-width="2" fill="#0B5D3B"/><path d="M12 8v8M8 12h8" stroke="#FFC629" stroke-width="2"/></svg>
    BidRoute
  </div>
  <button class="saved-toggle" id="savedToggle">☆ Saved (<span id="savedCount">0</span>)</button>
</div>

<div class="hero">
  <div class="sign">
    <p class="sign-eyebrow">Next Exit</p>
    <h1>Government Bid Leads</h1>
    <form class="search-row" id="searchForm">
      <input type="text" id="queryInput" value="StreetBond 120" aria-label="Product or search term" autocomplete="off">
      <div class="ac-wrap">
        <input type="text" id="locationInput" placeholder="State or city (optional)" aria-label="Location filter" autocomplete="off">
      </div>
      <select id="levelSelect" aria-label="Government level">
        <option value="all">All levels</option>
        <option value="federal">Federal</option>
        <option value="state">State / DOT</option>
        <option value="municipal">Municipal / County</option>
      </select>
      <button type="submit" class="go-btn" id="goBtn">GO</button>
    </form>
    <div class="chip-row" id="chipRow">
      <span class="chip-label">Try:</span>
      <button type="button" class="chip" data-q="StreetBond">StreetBond</button>
      <button type="button" class="chip" data-q="StreetBond DA">StreetBond DA</button>
      <button type="button" class="chip" data-q="Transpo Industries StreetBond">Transpo Industries StreetBond</button>
      <button type="button" class="chip" data-q="decorative pavement coating">decorative pavement coating</button>
      <button type="button" class="chip" data-q="colored crosswalk coating">colored crosswalk coating</button>
    </div>
  </div>
  <p class="disclaimer">Results are pulled live via web search and summarized — always confirm scope, dates, and value on the official solicitation before bidding.</p>
</div>

<div class="results-section">
  <div class="status-line" id="statusLine"></div>
  <div class="search-note" id="searchNote"></div>

  <div class="planrooms" id="planrooms">
    <p class="planrooms-label">Check these plan rooms directly</p>
    <div class="planroom-links" id="planroomLinks"></div>
  </div>

  <div class="results-list" id="resultsList"></div>
</div>

<footer>BidRoute · live search, not affiliated with any bid platform or agency.</footer>

<script>
  // Cloudflare Worker proxy — deployed from proxy/worker.js
  const PROXY_URL = "https://gh-pages-proxy.pablo-kunert.workers.dev";

  const SYSTEM_PROMPT = `You are a procurement research assistant. You get exactly ONE web search for this request. Use it to look for real government construction/procurement bid opportunities, RFPs, or awarded projects that reference the product or category given.

Rules:
- Call web_search exactly once, then immediately write your final answer as JSON. Do not search again.
- Only include things you actually found in the search results. Never invent agencies, projects, or URLs.
- Every result needs "type": "open_bid" (currently open/recent solicitation) or "reference_project" (completed/awarded project — still a useful lead).
- For open_bid, status is open|closing_soon|closed. For reference_project, status is "unknown".
- Keep each snippet under 12 words.
- Return AT MOST 2 results. Fewer, complete results beat more, truncated ones.
- The "note" field is REQUIRED on every response — one short sentence stating what you searched and roughly how many relevant hits came back.
- Write the JSON as your last step and finish it completely — nothing after the closing brace.
- Respond with ONLY raw JSON, no markdown code fences, no commentary before or after, matching exactly this schema:
{"results":[{"title":"string","agency":"string","location":"string","type":"open_bid|reference_project","status":"open|closing_soon|closed|unknown","deadline":"string or empty","estimatedValue":"string or empty","sourceUrl":"string","snippet":"string"}],"note":"string, always include"}`;

  function buildUserPrompt(query, location, level){
    const levelText = level === 'all' ? '' : ` at the ${level} government level`;
    const locText = location ? ` in ${location}` : ' anywhere in the United States';
    return `Search once for government construction or procurement leads${levelText} related to "${query}"${locText}. Return only the JSON schema described.`;
  }

  function deriveFallbackQuery(query){
    const stripped = query.replace(/\s+[\w-]*\d[\w-]*$/, '').trim();
    if(stripped && stripped.toLowerCase() !== query.trim().toLowerCase()){ return stripped; }
    return 'decorative pavement coating government bid';
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function slugId(str){
    let h = 0;
    const s = String(str || '');
    for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
    return 'p' + Math.abs(h).toString(36);
  }

  function extractJson(text){
    let t = text.trim();
    t = t.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const start = t.indexOf('{');
    const end   = t.lastIndexOf('}');
    if(start < 0 || end <= start){ throw new Error('No JSON object found in the response.'); }
    t = t.substring(start, end + 1);
    try{ return JSON.parse(t); }
    catch(e){ return repairTruncatedJson(t); }
  }

  function repairTruncatedJson(t){
    const resultsIdx = t.indexOf('"results"');
    if(resultsIdx < 0){ throw new Error('Response was cut off before any results could be read.'); }
    const arrStart = t.indexOf('[', resultsIdx);
    if(arrStart < 0){ throw new Error('Response was cut off before any results could be read.'); }
    let depth = 0, objStart = -1, inString = false, escape = false;
    const objects = [];
    for(let i = arrStart + 1; i < t.length; i++){
      const ch = t[i];
      if(inString){
        if(escape){ escape = false; }
        else if(ch === '\\'){ escape = true; }
        else if(ch === '"'){ inString = false; }
        continue;
      }
      if(ch === '"'){ inString = true; continue; }
      if(ch === '{'){ if(depth === 0){ objStart = i; } depth++; }
      else if(ch === '}'){
        depth--;
        if(depth === 0 && objStart >= 0){ objects.push(t.substring(objStart, i + 1)); objStart = -1; }
      } else if(ch === ']' && depth === 0){ break; }
    }
    const parsedObjects = [];
    for(const raw of objects){ try{ parsedObjects.push(JSON.parse(raw)); }catch(e){} }
    if(parsedObjects.length === 0){ throw new Error('Response was cut off before any complete result could be read.'); }
    return { results: parsedObjects, _partial: true };
  }

  const statusLabels = { open:'Open', closing_soon:'Closing soon', closed:'Closed', unknown:'Status unknown' };

  let lastResults = [];
  let savedMap = {};
  let viewingSaved = false;

  function loadSaved(){
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('bidroute:saved:')){
        try{ savedMap[key.replace('bidroute:saved:','')] = JSON.parse(localStorage.getItem(key)); }catch(e){}
      }
    }
    updateSavedCount();
  }

  function updateSavedCount(){
    document.getElementById('savedCount').textContent = Object.keys(savedMap).length;
  }

  function toggleSave(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    if(savedMap[id]){
      delete savedMap[id];
      localStorage.removeItem('bidroute:saved:' + id);
    } else {
      savedMap[id] = project;
      try{ localStorage.setItem('bidroute:saved:' + id, JSON.stringify(project)); }catch(e){}
    }
    updateSavedCount();
    render(viewingSaved ? Object.values(savedMap) : lastResults);
  }

  function cardHtml(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    const isReference = project.type === 'reference_project';
    const status = (project.status || 'unknown');
    const label = isReference ? 'Reference project' : (statusLabels[status] || 'Status unknown');
    const badgeClass = isReference ? 'reference' : status;
    const isSaved = !!savedMap[id];
    return `
      <div class="card status-${escapeHtml(status)} ${isReference ? 'is-reference' : ''}">
        <div class="card-top">
          <span class="agency">${escapeHtml(project.agency || 'Agency not specified')}</span>
          <span class="badge ${escapeHtml(badgeClass)}">${escapeHtml(label)}</span>
        </div>
        <h3>${escapeHtml(project.title || 'Untitled solicitation')}</h3>
        <div class="meta-row">
          <span><b>Location</b>${escapeHtml(project.location || '—')}</span>
          <span><b>${isReference ? 'Completed' : 'Deadline'}</b>${escapeHtml(project.deadline || '—')}</span>
          <span><b>Est. value</b>${escapeHtml(project.estimatedValue || '—')}</span>
        </div>
        <p class="snippet">${escapeHtml(project.snippet || '')}</p>
        <div class="card-actions">
          ${project.sourceUrl ? `<a class="view-link" href="${escapeHtml(project.sourceUrl)}" target="_blank" rel="noopener noreferrer">${isReference ? 'View source ↗' : 'View solicitation ↗'}</a>` : ''}
          <button class="save-btn ${isSaved ? 'saved' : ''}" data-id="${id}">${isSaved ? '★ Saved' : '☆ Save'}</button>
        </div>
      </div>`;
  }

  function render(list, note){
    const container = document.getElementById('resultsList');
    if(!list || list.length === 0){
      container.innerHTML = viewingSaved
        ? `<div class="empty-state"><h3>No saved leads yet</h3><p>Save a result and it'll show up here.</p></div>`
        : `<div class="empty-state"><h3>No matching opportunities found</h3><p>${note ? escapeHtml(note) : 'Try a broader term using the chips above, a different location, or another government level.'}</p></div>`;
      return;
    }
    container.innerHTML = list.map(cardHtml).join('');
    container.querySelectorAll('.save-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-id');
        const project = (viewingSaved ? Object.values(savedMap) : lastResults).find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id) || savedMap[id];
        if(project) toggleSave(project);
      });
    });
  }

  function setStatus(html, spinning){
    document.getElementById('statusLine').innerHTML = (spinning ? '<span class="scan"></span>' : '') + html;
  }

  async function searchOnce(query, location, level){
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: buildUserPrompt(query, location, level) }],
        tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 1 }]
      })
    });
    if(!response.ok){ throw new Error(`Search request failed (${response.status})`); }
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    if(!textBlocks.trim()){ throw new Error('No response text returned from search.'); }
    return extractJson(textBlocks);
  }

  function renderPlanroomLinks(query){
    const q = encodeURIComponent(query);
    const links = [
      { name:'Crisp Planroom',          tag:'deep link',       deep:true,  url:`https://www.crispplanroom.com/projects/public?search=${q}`,  note:'Searches project titles · SoCal school districts only' },
      { name:'VendorLine (PlanetBids)', tag:'browse only',     deep:false, url:'https://vendor.planetbids.com/nationwide-bids',               note:'Keyword search requires free registration' },
      { name:'SecureBids',              tag:'browse only',     deep:false, url:'https://securebids.com/agencies',                             note:'Browse by agency — no keyword search' },
      { name:'ConstructConnect',        tag:'requires signup', deep:false, url:'https://www.constructconnect.com/find-projects',              note:'Gated behind a contact form before search' },
    ];
    document.getElementById('planroomLinks').innerHTML = links.map(l =>
      `<a class="planroom-link ${l.deep?'deep':''}" href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(l.note)}">
        ${escapeHtml(l.name)} <span class="tag">${escapeHtml(l.tag)}</span>
      </a>`).join('');
  }

  async function search(query, location, level){
    viewingSaved = false;
    document.getElementById('savedToggle').classList.remove('active');
    document.getElementById('goBtn').disabled = true;
    setStatus(`Searching bid boards for &ldquo;${escapeHtml(query)}&rdquo;&hellip;`, true);
    document.getElementById('searchNote').textContent = '';
    document.getElementById('resultsList').innerHTML = '';
    renderPlanroomLinks(query);

    try{
      let parsed = await searchOnce(query, location, level);
      const notes = [];
      if(parsed.note) notes.push(parsed.note);

      if((parsed.results || []).length === 0){
        const fallbackQuery = deriveFallbackQuery(query);
        if(fallbackQuery.toLowerCase() !== query.trim().toLowerCase()){
          setStatus(`No hits for &ldquo;${escapeHtml(query)}&rdquo; — trying &ldquo;${escapeHtml(fallbackQuery)}&rdquo;&hellip;`, true);
          const parsed2 = await searchOnce(fallbackQuery, location, level);
          if(parsed2.note) notes.push(parsed2.note);
          if((parsed2.results || []).length > 0){ parsed = parsed2; }
        }
      }

      lastResults = parsed.results || [];
      const combinedNote = notes.join('  ·  ');

      if(lastResults.length === 0){
        setStatus('No results.', false);
      } else if(parsed._partial){
        setStatus(`${lastResults.length} result${lastResults.length===1?'':'s'} recovered from a cut-off response — try again for a cleaner pass.`, false);
      } else {
        setStatus(`${lastResults.length} result${lastResults.length===1?'':'s'} found · ${new Date().toLocaleTimeString()}`, false);
      }
      document.getElementById('searchNote').textContent = combinedNote;
      render(lastResults, combinedNote);
    } catch(err){
      console.error(err);
      document.getElementById('resultsList').innerHTML = `<div class="error-state"><h3>Search didn't go through</h3><p>${escapeHtml(err.message || 'Something went wrong reaching the search service.')} Try again in a moment.</p></div>`;
      setStatus('Search failed.', false);
    } finally {
      document.getElementById('goBtn').disabled = false;
    }
  }

  document.getElementById('searchForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    search(
      document.getElementById('queryInput').value.trim() || 'StreetBond 120',
      document.getElementById('locationInput').value.trim(),

    );
  });

  document.getElementById('chipRow').addEventListener('click', (e)=>{

  document.getElementById('savedToggle').addEventListener('click', ()=>{

    if(viewingSaved){

      setStatus(`Showing ${Object.keys(savedMap).length} saved lead${Object.keys(savedMap).length===1?'':'s'}`, false);

      setStatus(lastResults.length ? `${lastResults.length} result${lastResults.length===1?'':'s'} found` : '', false);
      render(lastResults);
    }
  });

  const STATE_COUNT = 51;

  function makeLocationAC(inputEl){
    const wrap = inputEl.parentElement;
    const drop = document.createElement('ul');
    drop.className = 'ac-drop';
    wrap.appendChild(drop);
    let activeIdx = -1, cur = [];

    function query(q){
      const ql = q.toLowerCase();
      const starts = [], contains = [];
      for(const loc of LOCATIONS){
        const nl = loc.n.toLowerCase(), al = loc.a.toLowerCase();
        if(nl.startsWith(ql) || al === ql || al.startsWith(ql)) starts.push(loc);
        else if(nl.includes(ql)) contains.push(loc);
      }
      return [...starts, ...contains].slice(0, 8);
    }

    function fill(loc){
      const isState = LOCATIONS.indexOf(loc) < STATE_COUNT;
      return isState ? loc.n : loc.n + ', ' + loc.a;
    }

    function setActive(i){
      activeIdx = i;
      drop.querySelectorAll('.ac-item').forEach((el,idx)=>el.classList.toggle('hi',idx===i));
      const hi = drop.querySelectorAll('.ac-item')[i];
      if(hi) hi.scrollIntoView({block:'nearest'});
    }
    function close(){ drop.classList.remove('open'); activeIdx=-1; cur=[]; }
    function select(loc){ inputEl.value = fill(loc); close(); }

    function render(results){
      cur = results; activeIdx = -1; drop.innerHTML = '';
      if(!results.length){ close(); return; }
      results.forEach((loc,i)=>{
        const li = document.createElement('li');
        li.className = 'ac-item';
        li.innerHTML = escapeHtml(loc.n) + ' <span class="ac-sub">' + escapeHtml(loc.a) + '</span>';
        li.addEventListener('mousedown', e=>{ e.preventDefault(); select(loc); });
        li.addEventListener('mouseenter', ()=>setActive(i));
        drop.appendChild(li);
      });
      drop.classList.add('open');
    }

    inputEl.addEventListener('input',()=>{ const q=inputEl.value.trim(); q.length<1?close():render(query(q)); });
    inputEl.addEventListener('focus',()=>{ const q=inputEl.value.trim(); if(q.length>=1) render(query(q)); });
    inputEl.addEventListener('blur',()=>setTimeout(close,150));
    inputEl.addEventListener('keydown',e=>{
      if(!drop.classList.contains('open')) return;
      const items=drop.querySelectorAll('.ac-item');
      if(e.key==='ArrowDown'){e.preventDefault();setActive(Math.min(activeIdx+1,items.length-1));}
      else if(e.key==='ArrowUp'){e.preventDefault();setActive(Math.max(activeIdx-1,0));}
      else if(e.key==='Enter'&&activeIdx>=0&&cur[activeIdx]){e.preventDefault();select(cur[activeIdx]);}
      else if(e.key==='Escape'){e.preventDefault();close();}
    });
  }
