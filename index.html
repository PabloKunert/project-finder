<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidRoute — StreetBond 120 Government Bid Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --surface: #FFFFFF;
  --surface-subtle: #F7F8FA;
  --border: #E3E5E8;
  --border-strong: #C2C5CC;
  --text-primary: #1F2328;
  --text-secondary: #6A737D;
  --text-muted: #9DA3AC;
  --action: #2D7FF9;
  --action-hover: #1A6BE8;
  --action-bg: #EBF3FF;
  --row-hover: #F0F4FA;
  --deadline-red: #CF222E;
  --radius: 6px;
}

*, *::before, *::after { box-sizing: border-box; }
[hidden] { display: none !important; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--surface-subtle);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/* ── Focus ── */
:focus-visible {
  outline: 2px solid var(--action);
  outline-offset: 2px;
}

/* ── Toolbar ── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.toolbar-inner {
  max-width: 1200px;
  margin: 0 auto;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 7px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.01em;
  color: var(--text-primary);
  white-space: nowrap;
  flex-shrink: 0;
  text-decoration: none;
}

/* ── Search row ── */
.search-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex: 1 1 0;
  min-width: 0;
}
.search-row input[type="text"],
.search-row select {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.12s;
}
.search-row input[type="text"]:focus,
.search-row select:focus {
  border-color: var(--action);
  box-shadow: 0 0 0 2px rgba(45,127,249,0.15);
}
#queryWrap { flex: 2 1 180px; position: relative; }
#queryInput { width: 100%; font-weight: 500; }
#locationSelect { flex: 1 1 130px; min-width: 0; cursor: pointer; }
#levelSelect { flex: 1 1 120px; min-width: 0; cursor: pointer; }
.go-btn {
  flex-shrink: 0;
  height: 32px;
  padding: 0 16px;
  background: var(--action);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.12s;
  white-space: nowrap;
}
.go-btn:hover { background: var(--action-hover); }
.go-btn:active { transform: scale(0.98); }
.go-btn:disabled { opacity: 0.6; cursor: wait; }

/* ── Topbar actions (right side) ── */
.topbar-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  margin-left: auto;
}
.toolbar-divider {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 4px;
}
.topbar-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  white-space: nowrap;
}
.topbar-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.topbar-btn.active { background: var(--action-bg); border-color: var(--action); color: var(--action); }
.alerts-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  background: var(--deadline-red);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  border-radius: 999px;
  padding: 0 4px;
  margin-left: 2px;
}

/* ── Term browser ── */
.term-browser-wrap {
  position: relative;
}
.terms-trigger {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
  white-space: nowrap;
}
.terms-trigger:hover { border-color: var(--border-strong); color: var(--text-primary); }
.terms-trigger[aria-expanded="true"] { border-color: var(--action); color: var(--action); background: var(--action-bg); }
.term-sel-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 16px;
  height: 16px;
  background: var(--action);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  border-radius: 999px;
  padding: 0 4px;
  margin-left: 2px;
}

/* ── Term panel (popover) ── */
.term-panel {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  z-index: 300;
  width: 480px;
  max-width: calc(100vw - 24px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10), 0 2px 6px rgba(0,0,0,0.06);
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.term-panel-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}
.term-panel-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.term-group { display: flex; flex-direction: column; gap: 6px; }
.term-group-header { display: flex; align-items: center; justify-content: space-between; }
.term-group-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
}
.term-chips { display: flex; flex-wrap: wrap; gap: 5px; }

/* Chips — colored per group via CSS vars on .term-group */
.chip {
  display: inline-flex;
  align-items: center;
  height: 24px;
  padding: 0 9px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity 0.1s;
  background: var(--chip-bg, #EEF2F7);
  color: var(--chip-text, #4A5568);
}
.chip:hover { opacity: 0.82; }
.chip.selected {
  background: var(--chip-text, #4A5568);
  color: #fff;
  border-color: transparent;
}
.chip.selected::before { content: '✓ '; font-size: 10px; opacity: 0.85; }

/* Group color vars */
.term-group[data-group-index="0"] { --chip-bg: #E6F0FD; --chip-text: #1A5FA0; }
.term-group[data-group-index="1"] { --chip-bg: #E4F7EE; --chip-text: #1A7A4A; }
.term-group[data-group-index="2"] { --chip-bg: #FFF2E0; --chip-text: #A85200; }
.term-group[data-group-index="3"] { --chip-bg: #F2EAFF; --chip-text: #6B21A8; }
.term-group[data-group-index="4"] { --chip-bg: #FDE8E8; --chip-text: #B91C1C; }

.select-all-link {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
  transition: color 0.1s;
}
.select-all-link:hover { color: var(--text-primary); }

.term-action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.term-search-btn {
  height: 30px;
  padding: 0 14px;
  background: var(--action);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.12s;
}
.term-search-btn:hover { background: var(--action-hover); }
.term-clear-link {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
  transition: color 0.1s;
}
.term-clear-link:hover { color: var(--text-primary); }

/* ── Results section ── */
.results-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 20px 80px;
}
.results-header {
  margin-bottom: 12px;
}
.status-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 28px;
}
.status-line {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
}
.elapsed { font-size: 11px; opacity: 0.7; }
.scan {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--action);
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@media (prefers-reduced-motion: reduce) {
  .scan { animation: none; }
  .result-row { animation: none !important; }
}
@keyframes spin { to { transform: rotate(360deg); } }

.cancel-btn {
  height: 26px;
  padding: 0 10px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.cancel-btn:hover { border-color: var(--deadline-red); color: var(--deadline-red); }

.watch-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  height: 26px;
  padding: 0 10px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.watch-btn:hover { border-color: var(--action); color: var(--action); }
.watch-btn.watching { background: var(--action-bg); border-color: var(--action); color: var(--action); }

/* ── Search note ── */
.search-note-wrap { margin-bottom: 12px; }
.search-note-wrap summary {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  user-select: none;
}
.search-note-wrap summary::-webkit-details-marker { display: none; }
.search-note-wrap summary::before { content: '▸'; font-size: 9px; }
.search-note-wrap[open] summary::before { content: '▾'; }
.search-note {
  font-size: 12px;
  color: var(--text-secondary);
  font-style: italic;
  margin: 6px 0 0;
  line-height: 1.5;
  padding-left: 12px;
}

/* ── Plan rooms ── */
.planrooms {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 14px;
}
.planrooms-label {
  list-style: none;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.planrooms-label::-webkit-details-marker { display: none; }
details.planrooms > summary.planrooms-label::before { content: '▸ '; font-size: 9px; }
details.planrooms[open] > summary.planrooms-label::before { content: '▾ '; }
.planroom-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.planroom-item { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.planroom-link {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  text-decoration: none;
  background: var(--surface-subtle);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: var(--radius);
  transition: border-color 0.12s, background 0.12s;
}
.planroom-link:hover { border-color: var(--action); background: var(--surface); }
.planroom-link .tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.planroom-link.deep .tag { color: var(--action); }
.planroom-link.open-search .tag { color: var(--action); font-weight: 600; }
.planroom-login-link {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--action);
  text-decoration: none;
  padding: 4px 8px;
  border-radius: var(--radius);
  border: 1px solid rgba(45,127,249,0.3);
  background: var(--action-bg);
  white-space: nowrap;
  transition: background 0.12s, border-color 0.12s;
}
.planroom-login-link:hover { background: rgba(45,127,249,0.15); border-color: var(--action); }
.planroom-no-login {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  color: var(--text-muted);
  font-style: italic;
  white-space: nowrap;
}
.planroom-cred-note {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
  margin: 8px 0 0;
  line-height: 1.45;
  width: 100%;
}

/* ── Column headers ── */
.col-headers {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px 6px;
  border-bottom: 1px solid var(--border-strong);
  margin-bottom: 2px;
}
.col-h-main {
  flex: 1 1 0;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.col-h-right {
  display: flex;
  align-items: center;
  gap: 0;
}
.col-h-location, .col-h-value, .col-h-deadline, .col-h-status {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-muted);
  text-align: right;
}
.col-h-location { width: 110px; }
.col-h-value { width: 100px; }
.col-h-deadline { width: 100px; }
.col-h-status { width: 90px; }
.col-h-actions { width: 68px; }

/* ── Result rows ── */
.results-list { display: flex; flex-direction: column; }
.result-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  animation: row-in 0.18s ease both;
  transition: background 0.1s;
}
.result-row:first-child { border-top: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0; }
.result-row:last-child { border-radius: 0 0 var(--radius) var(--radius); }
.result-row:only-child { border-radius: var(--radius); }
@keyframes row-in { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }

@media (hover: hover) {
  .result-row:hover { background: var(--row-hover); }
  .result-row:hover .row-actions { opacity: 1; transform: translateX(0); }
}
@media (hover: none) {
  .row-actions { opacity: 1 !important; transform: none !important; }
}
.result-row:focus-within .row-actions { opacity: 1; transform: translateX(0); }

.row-body {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.row-left {
  flex: 1 1 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.row-titles { display: flex; flex-direction: column; gap: 1px; }
.agency {
  font-size: 11px;
  color: var(--text-secondary);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-title {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.35;
}
.snippet {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
  margin: 2px 0 0;
}

/* Term tags on result rows */
.term-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.term-tag {
  display: inline-flex;
  align-items: center;
  height: 18px;
  padding: 0 6px;
  border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
  letter-spacing: 0.01em;
}
.term-tag.direct { background: var(--action-bg); color: var(--action); }
.term-tag.loose { background: var(--surface-subtle); color: var(--text-muted); border: 1px solid var(--border); }
.term-tag.more {
  background: var(--surface-subtle);
  color: var(--text-muted);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 10px;
  font-weight: 500;
}
.term-tag.more:hover { border-color: var(--action); color: var(--action); }

/* Row meta columns */
.row-meta {
  display: flex;
  align-items: flex-start;
  gap: 0;
  flex-shrink: 0;
}
.row-location { width: 110px; font-size: 12px; color: var(--text-secondary); text-align: right; padding-right: 4px; }
.row-value {
  width: 100px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-primary);
  text-align: right;
  padding-right: 4px;
}
.row-deadline {
  width: 100px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
  padding-right: 4px;
}
.row-status { width: 90px; display: flex; justify-content: flex-end; padding-right: 4px; }

/* Badges */
.badge {
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 7px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge.open { background: #E4F7EE; color: #1A7A4A; }
.badge.closing_soon { background: #FFF2E0; color: #A85200; }
.badge.closed { background: var(--surface-subtle); color: var(--text-muted); border: 1px solid var(--border); }
.badge.reference { background: var(--surface-subtle); color: var(--text-secondary); border: 1px solid var(--border); }
.badge.unknown { background: var(--surface-subtle); color: var(--text-muted); border: 1px solid var(--border); }

/* Row actions (hover-reveal) */
.row-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
  width: 60px;
  justify-content: flex-end;
  opacity: 0;
  transform: translateX(4px);
  transition: opacity 0.1s ease, transform 0.1s ease;
}
.view-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: var(--radius);
  background: var(--surface-subtle);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px;
  text-decoration: none;
  transition: border-color 0.1s, color 0.1s, background 0.1s;
}
.view-link:hover { border-color: var(--action); color: var(--action); background: var(--action-bg); }
.save-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: var(--radius);
  background: var(--surface-subtle);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s, background 0.1s;
}
.save-btn:hover { border-color: var(--action); color: var(--action); background: var(--action-bg); }
.save-btn.saved { background: #FFFBE6; border-color: #D4A500; color: #7A6200; }

/* ── Input error ── */
.input-error > input { border-color: var(--deadline-red) !important; box-shadow: 0 0 0 2px rgba(207,34,46,0.15) !important; }
.err-msg {
  position: absolute;
  top: calc(100% + 3px);
  left: 0;
  font-size: 11px;
  color: var(--deadline-red);
  background: var(--surface);
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);

/* ── Empty / Error states ── */
.empty-state, .error-state {
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  color: var(--text-secondary);
}
.error-state { border-color: rgba(207,34,46,0.4); }
.empty-state h3, .error-state h3 {

  font-weight: 600;
  color: var(--text-primary);
  margin: 0 0 6px;
}
.error-state h3 { color: var(--deadline-red); }
.empty-state p, .error-state p {

  margin: 0;
  color: var(--text-secondary);
}

/* ── Batch results ── */
.batch-section { }
.batch-section + .batch-section { border-top: 1px solid var(--border); margin-top: 0; padding-top: 0; }
.batch-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: var(--surface-subtle);
  border-bottom: 1px solid var(--border);
  gap: 10px;
}
.batch-term-name {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}
.batch-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}
.batch-fail-msg {
  font-size: 12px;
  color: var(--deadline-red);
  display: flex;
  align-items: center;
  gap: 6px;
}
.retry-btn {
  background: transparent;
  border: 1px solid var(--deadline-red);
  color: var(--deadline-red);
  border-radius: 999px;
  cursor: pointer;
  font-size: 11px;
  padding: 2px 8px;
  transition: background 0.1s;
}
.retry-btn:hover { background: rgba(207,34,46,0.08); }
.batch-no-results {
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  margin: 0;
  padding: 8px 14px;
}

/* ── Alerts ── */
.alert-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  animation: row-in 0.18s ease both;
}
.alert-card-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.alert-query { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.new-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: var(--deadline-red);
  color: #fff;
  padding: 2px 7px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
}
.alert-meta-row {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 5px;
}
.alert-meta-row span::after { content: '·'; margin-left: 6px; }
.alert-meta-row span:last-child::after { content: ''; }
.alert-dates {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 10px;
}
.alert-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.check-btn, .delete-alert-btn, .notify-toggle-btn {
  height: 28px;
  padding: 0 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  transition: border-color 0.12s, color 0.12s, background 0.12s;
}
.check-btn { background: var(--action); border-color: var(--action); color: #fff; }
.check-btn:hover { background: var(--action-hover); }
.check-btn:disabled { opacity: 0.6; cursor: wait; }
.delete-alert-btn:hover { border-color: var(--deadline-red); color: var(--deadline-red); }
.notify-toggle-btn.on { background: var(--action-bg); border-color: var(--action); color: var(--action); }
.alert-new-results {
  margin-top: 12px;
  border-top: 1px dashed rgba(207,34,46,0.4);
  padding-top: 10px;
}
.alert-new-results-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--deadline-red);
  margin: 0 0 8px;
}
details.alert-baseline-results {
  margin-top: 12px;
  border-top: 1px solid var(--border);
  padding-top: 10px;
}
details.alert-baseline-results > summary {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  user-select: none;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-muted);
}
details.alert-baseline-results > summary::-webkit-details-marker { display: none; }
details.alert-baseline-results > summary::before { content: '▸ '; font-size: 9px; }
details.alert-baseline-results[open] > summary::before { content: '▾ '; }
.alert-results-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }

/* ── Autocomplete ── */
.ac-wrap { position: relative; }
.ac-drop {
  position: absolute;
  top: calc(100% + 4px);
  left: 0; right: 0;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  list-style: none;
  margin: 0; padding: 0;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.12s ease, opacity 0.1s ease;
  pointer-events: none;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}
.ac-drop.open { max-height: 260px; opacity: 1; overflow-y: auto; pointer-events: all; }
.ac-item {
  padding: 8px 12px;
  font-size: 13px;
  color: var(--text-primary);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover, .ac-item.hi { background: var(--row-hover); color: var(--action); }

/* ── Footer ── */
footer {

  font-size: 12px;

/* ── Responsive ── */
@media (max-width: 900px) {

@media (max-width: 768px) {

  .row-actions { opacity: 1; transform: none; }

@media (max-width: 480px) {

      <span class="col-h-actions"></span>
    </div>
  </div>

  <div class="results-list" id="resultsList"></div>
</div>

<footer>BidRoute · live search · not affiliated with any bid platform or agency.</footer>

<script>
  const TAG_PALETTE = [
    { bg:'#E6F0FD', text:'#1A5FA0' },
    { bg:'#E4F7EE', text:'#1A7A4A' },
    { bg:'#FFF2E0', text:'#A85200' },
    { bg:'#F2EAFF', text:'#6B21A8' },
    { bg:'#FDE8E8', text:'#B91C1C' },
    { bg:'#E8F8FF', text:'#0E6B8C' },
    { bg:'#FFFBE6', text:'#7A6200' },
  ];
  const TERM_GROUP_MAP = {
    'StreetBond 120':0,'StreetBond 150':0,'StreetBond':0,'StreetBond DA':0,'Transpo Industries StreetBond':0,
    'Cool coating':1,'Solar reflective coating':1,'Cool pavement':1,
    'Decorative thermoplastic':2,'Thermoplastic XD':2,'Intersection thermoplastic':2,
    'Decorative asphalt':3,'Stamped asphalt':3,'Decorative crosswalks':3,'Decocoat asphalt coating':3,
    'Epoxy modified acrylic':4,'Epoxy fortified acrylic':4,'Acrylic asphalt coating':4,
    'Acrylic playground coating':4,'Plexipave tennis court coating':4,
    'decorative pavement coating':4,'colored crosswalk coating':4,
  };
  function getTagColor(term){ const idx = TERM_GROUP_MAP[term] ?? 0; return TAG_PALETTE[idx % TAG_PALETTE.length]; }

  // Cloudflare Worker proxy — deployed from proxy/worker.js
  const PROXY_URL = "https://gh-pages-proxy.pablo-kunert.workers.dev";

  // Location sentinel for "no state restriction" / nationwide
  const ALL_STATES_VAL = 'all';

  // Returns '' for nationwide (used when building search queries)
  function locationForSearch(loc){
    return (loc === ALL_STATES_VAL || !loc) ? '' : loc;
  }
  // Returns 'Nationwide' for compact summaries, state name otherwise
  function locationDisplayNationwide(loc){
    return (loc === ALL_STATES_VAL || !loc) ? 'Nationwide' : loc;
  }

  const SYSTEM_PROMPT = `You are a procurement research assistant. You get exactly ONE web search for this request. Use it to look for real government construction/procurement bid opportunities, RFPs, or awarded projects that reference the product or category given.

Rules:
- Call web_search exactly once, then immediately write your final answer as JSON. Do not search again.
- Only include things you actually found in the search results. Never invent agencies, projects, or URLs.
- Every result needs "type": "open_bid" (currently open/recent solicitation) or "reference_project" (completed/awarded project — still a useful lead).
- For open_bid, status is open|closing_soon|closed. For reference_project, status is "unknown".
- Keep each snippet under 12 words.
- Return AT MOST 20 results. Prioritize open/active bids over reference projects.
- The "note" field is REQUIRED on every response — one short sentence stating what you searched and roughly how many relevant hits came back.
- Write the JSON as your last step and finish it completely — nothing after the closing brace.
- Respond with ONLY raw JSON, no markdown code fences, no commentary before or after, matching exactly this schema:
{"results":[{"title":"string","agency":"string","location":"string","type":"open_bid|reference_project","status":"open|closing_soon|closed|unknown","deadline":"string or empty","estimatedValue":"string or empty","sourceUrl":"string","snippet":"string"}],"note":"string, always include"}`;

  function buildUserPrompt(query, location, level){
    const levelText = level === 'all' ? '' : ` at the ${level} government level`;
    const effectiveLoc = locationForSearch(location);
    const locText = effectiveLoc ? ` in ${effectiveLoc}` : ' across the United States';
    return `Search once for government construction or procurement leads${levelText} related to "${query}"${locText}. Return only the JSON schema described.`;
  }

  function deriveFallbackQuery(query){
    const stripped = query.replace(/\s+[\w-]*\d[\w-]*$/, '').trim();
    if(stripped && stripped.toLowerCase() !== query.trim().toLowerCase()){ return stripped; }
    return 'decorative pavement coating government bid';
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function slugId(str){
    let h = 0;
    const s = String(str || '');
    for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) | 0; }
    return 'p' + Math.abs(h).toString(36);
  }

  function extractJson(text){
    let t = text.trim();
    t = t.replace(/^```json/i,'').replace(/^```/,'').replace(/```$/,'').trim();
    const start = t.indexOf('{');
    const end   = t.lastIndexOf('}');
    if(start < 0 || end <= start){ throw new Error('No JSON object found in the response.'); }
    t = t.substring(start, end + 1);
    try{ return JSON.parse(t); }
    catch(e){ return repairTruncatedJson(t); }
  }

  function repairTruncatedJson(t){
    const resultsIdx = t.indexOf('"results"');
    if(resultsIdx < 0){ throw new Error('Response was cut off before any results could be read.'); }
    const arrStart = t.indexOf('[', resultsIdx);
    if(arrStart < 0){ throw new Error('Response was cut off before any results could be read.'); }
    let depth = 0, objStart = -1, inString = false, escape = false;
    const objects = [];
    for(let i = arrStart + 1; i < t.length; i++){
      const ch = t[i];
      if(inString){
        if(escape){ escape = false; }
        else if(ch === '\\'){ escape = true; }
        else if(ch === '"'){ inString = false; }
        continue;
      }
      if(ch === '"'){ inString = true; continue; }
      if(ch === '{'){ if(depth === 0){ objStart = i; } depth++; }
      else if(ch === '}'){
        depth--;
        if(depth === 0 && objStart >= 0){ objects.push(t.substring(objStart, i + 1)); objStart = -1; }
      } else if(ch === ']' && depth === 0){ break; }
    }
    const parsedObjects = [];
    for(const raw of objects){ try{ parsedObjects.push(JSON.parse(raw)); }catch(e){} }
    if(parsedObjects.length === 0){ throw new Error('Response was cut off before any complete result could be read.'); }
    return { results: parsedObjects, _partial: true };
  }

  const statusLabels = { open:'Open', closing_soon:'Closing soon', closed:'Closed', unknown:'Status unknown' };

  let lastResults = [];
  let savedMap = {};
  let viewingSaved = false;
  let alertsMap = {};
  let viewingAlerts = false;
  let currentSearchCriteria = {query:'', location:'', level:'all'};
  let isBatchMode = false;
  let batchAbortController = null;
  let batchResultsAll = [];
  let batchTermSections = [];
  let batchSeen = new Set();

  function loadSaved(){
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('bidroute:saved:')){
        try{ savedMap[key.replace('bidroute:saved:','')] = JSON.parse(localStorage.getItem(key)); }catch(e){}
      }
    }
    updateSavedCount();
  }

  function updateSavedCount(){
    document.getElementById('savedCount').textContent = Object.keys(savedMap).length;
  }

  function toggleSave(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    if(savedMap[id]){
      delete savedMap[id];
      localStorage.removeItem('bidroute:saved:' + id);
    } else {
      savedMap[id] = project;
      try{ localStorage.setItem('bidroute:saved:' + id, JSON.stringify(project)); }catch(e){}
    }
    updateSavedCount();
    if(viewingAlerts) renderAlertsView();
    else if(isBatchMode && !viewingSaved) renderBatch(batchTermSections);
    else render(viewingSaved ? Object.values(savedMap) : lastResults);
  }

  function renderTermTags(terms){
    if(!terms || !terms.length) return '';
    const MAX = 3;
    const vis = terms.slice(0, MAX);
    const hid = terms.slice(MAX);
    let html = vis.map(t => {
      const color = getTagColor(t.term);
      const style = t.confidence === 'direct'
        ? `style="background:${color.bg};color:${color.text}"`
        : '';
      return `<span class="term-tag ${escapeHtml(t.confidence||'direct')}" ${style}>${escapeHtml(t.term)}</span>`;
    }).join('');
    if(hid.length){
      html += hid.map(t => {
        const color = getTagColor(t.term);
        const style = t.confidence === 'direct'
          ? `style="background:${color.bg};color:${color.text}"`
          : '';
        return `<span class="term-tag ${escapeHtml(t.confidence||'direct')} tt-hidden" ${style} hidden>${escapeHtml(t.term)}</span>`;
      }).join('');
      html += `<button type="button" class="term-tag more">+${hid.length} more</button>`;
    }
    return `<div class="term-tags">${html}</div>`;
  }

  function cardHtml(project){
    const id = slugId((project.sourceUrl || '') + (project.title || ''));
    const isReference = project.type === 'reference_project';
    const status = (project.status || 'unknown');
    const label = isReference ? 'Reference' : (statusLabels[status] || 'Unknown');
    const badgeClass = isReference ? 'reference' : status;
    const isSaved = !!savedMap[id];
    function cleanVal(v){ return (v && v.trim() && v.trim() !== '—') ? v.trim() : ''; }
    const location = cleanVal(project.location);
    const value = cleanVal(project.estimatedValue);
    const deadline = cleanVal(isReference ? (project.deadline ? 'Awarded '+project.deadline : '') : project.deadline);
    return `
    <div class="result-row status-${escapeHtml(status)}${isReference ? ' is-reference' : ''}" tabindex="0">
      <div class="row-body">
        <div class="row-left">
          <div class="row-titles">
            <span class="agency">${escapeHtml(project.agency || 'Agency not specified')}</span>
            <div class="row-title">${escapeHtml(project.title || 'Untitled solicitation')}</div>
            ${project.snippet ? `<p class="snippet">${escapeHtml(project.snippet)}</p>` : ''}
          </div>
          ${renderTermTags(project.matchedTerms)}
        </div>
        <div class="row-meta">
          <span class="row-location">${escapeHtml(location)}</span>
          <span class="row-value">${escapeHtml(value)}</span>
          <span class="row-deadline">${escapeHtml(deadline)}</span>
          <span class="row-status"><span class="badge ${escapeHtml(badgeClass)}">${escapeHtml(label)}</span></span>
        </div>
      </div>
      <div class="row-actions">
        ${project.sourceUrl ? `<a class="view-link" href="${escapeHtml(project.sourceUrl)}" target="_blank" rel="noopener noreferrer" title="${isReference ? 'View source' : 'View solicitation'}">↗</a>` : ''}
        <button class="save-btn ${isSaved ? 'saved' : ''}" data-id="${id}" title="${isSaved ? 'Saved' : 'Save'}">${isSaved ? '★' : '☆'}</button>
      </div>
    </div>`;
  }

  function render(list, note){
    const container = document.getElementById('resultsList');
    if(!list || list.length === 0){
      document.getElementById('colHeaders').hidden = true;
      container.innerHTML = viewingSaved
        ? `<div class="empty-state"><h3>No saved leads yet</h3><p>Save a result and it'll show up here.</p></div>`
        : `<div class="empty-state"><h3>No matching opportunities found</h3><p>${note ? escapeHtml(note) : 'Try a broader term using the chips above, a different location, or another government level.'}</p></div>`;
      return;
    }
    container.innerHTML = list.map(cardHtml).join('');
    document.getElementById('colHeaders').hidden = false;
    container.querySelectorAll('.save-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.getAttribute('data-id');
        const project = (viewingSaved ? Object.values(savedMap) : lastResults).find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id) || savedMap[id];
        if(project) toggleSave(project);
      });
    });
    container.querySelectorAll('.term-tag.more').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        btn.parentElement.querySelectorAll('.tt-hidden').forEach(t=>{ t.hidden = false; });
        btn.hidden = true;
      });
    });
  }

  function setStatus(html, spinning){
    document.getElementById('statusLine').innerHTML = (spinning ? '<span class="scan"></span>' : '') + html;
  }

  async function searchOnce(query, location, level, signal){
    const response = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 8000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: buildUserPrompt(query, location, level) }],
        tools: [{ type: 'web_search_20250305', name: 'web_search', max_uses: 1 }]
      }),
      signal
    });
    if(!response.ok){ throw new Error(`Search request failed (${response.status})`); }
    const data = await response.json();
    const textBlocks = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n');
    if(!textBlocks.trim()){ throw new Error('No response text returned from search.'); }
    return extractJson(textBlocks);
  }

  function renderPlanroomLinks(query, location){
    const q = encodeURIComponent(query);
    const effectiveLoc = locationForSearch(location);
    const isCa = /\bcalifornia\b/i.test(effectiveLoc);

    // Login URL for Crisp deep-links to the search after auth via their redirect= param
    const crispLoginUrl = 'https://www.crispplanroom.com/auth/login?redirect='
      + encodeURIComponent('https://www.crispplanroom.com/projects/public?search=' + query);

    // SAM.gov uses bracket-style array params; only encode the query value
    const samUrl = `https://sam.gov/search/?index=opp&sfm[simpleSearch][keywordRadio]=ALL&sfm[simpleSearch][keywords][0]=${q}`;

    const rooms = [
      // ── Open-search sources (no login required) ──────────────────────────
      {
        name: 'SAM.gov', tag: 'open search', cls: 'open-search',
        browseUrl: samUrl,
        browseNote: 'Federal contract opportunities · keyword search, no login required',
        loginUrl: null, loginNote: null,
      },
      {
        name: 'BidNet Direct', tag: 'open search', cls: 'open-search',
        browseUrl: `https://www.bidnetdirect.com/public/solicitations/open?keywords=${q}`,
        browseNote: 'Multi-state & local bids · full listings may prompt registration',
        loginUrl: null, loginNote: null,
      },
      // CA-only sources, shown conditionally
      ...(isCa ? [
        {
          name: 'Cal eProcure (CSCR)', tag: 'browse only', cls: '',
          browseUrl: 'https://caleprocure.ca.gov/pages/public-search.aspx',
          browseNote: 'California State Contracts Register · enter keyword manually after landing (SPA — URL pre-fill not supported)',
          loginUrl: null, loginNote: null,
        },
        {
          name: 'Caltrans (dot.ca.gov)', tag: 'CA DOT', cls: '',
          browseUrl: 'https://dot.ca.gov/programs/procurement/solicitation-notices',
          browseNote: 'California Dept. of Transportation solicitation notices — pavement, coatings, road projects',
          loginUrl: null, loginNote: null,
        },
      ] : []),
      // ── Gated / account-required sources ─────────────────────────────────
      {
        name: 'Crisp Planroom', tag: 'deep link', cls: 'deep',
        browseUrl: `https://www.crispplanroom.com/projects/public?search=${q}`,
        browseNote: 'Searches project titles · SoCal school districts only',
        loginUrl: crispLoginUrl,
        loginNote: 'Lands on your search after login',
      },
      {
        name: 'VendorLine (PlanetBids)', tag: 'browse only', cls: '',
        browseUrl: 'https://vendor.planetbids.com/nationwide-bids',
        browseNote: 'Keyword search requires free registration',
        loginUrl: 'https://vendorline.planetbids.com/login',
        loginNote: 'Log in to search nationwide bids',
      },
      {
        name: 'SecureBids', tag: 'per-agency', cls: '',
        browseUrl: 'https://securebids.com/agencies',
        browseNote: 'Browse agencies — login is on each agency\'s own page',
        loginUrl: null,
        loginNote: 'No central login — find your agency above, then log in from their page',
      },
      {
        name: 'ConstructConnect', tag: 'requires signup', cls: '',
        browseUrl: 'https://www.constructconnect.com/find-projects',
        browseNote: 'Full access requires a paid subscription',
        loginUrl: 'https://login.io.constructconnect.com/login',
        loginNote: 'Log in to your ConstructConnect account',
      },
    ];

    document.getElementById('planroomLinks').innerHTML = rooms.map(r => `
      <div class="planroom-item">
        <a class="planroom-link ${r.cls}" href="${escapeHtml(r.browseUrl)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(r.browseNote)}">
          ${escapeHtml(r.name)} <span class="tag">${escapeHtml(r.tag)}</span>
        </a>
        ${r.loginUrl
          ? `<a class="planroom-login-link" href="${escapeHtml(r.loginUrl)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(r.loginNote)}">Log in ↗</a>`
          : r.loginNote
            ? `<span class="planroom-no-login" title="${escapeHtml(r.loginNote)}">login: per-agency</span>`
            : ''
        }
      </div>`).join('')
      + `<p class="planroom-cred-note">Logins open on each plan room's own site — BidRoute never sees or stores your credentials.</p>`;
  }

  let searchAbortController = null;

  async function search(query, location, level){
    isBatchMode = false;
    currentSearchCriteria = {query, location, level};
    if(searchAbortController) searchAbortController.abort();
    searchAbortController = new AbortController();
    const { signal } = searchAbortController;
    const TIMEOUT_MS = 20000;
    const timeoutId = setTimeout(()=>{ if(searchAbortController) searchAbortController.abort(); }, TIMEOUT_MS);
    const startTime = Date.now();

    viewingSaved = false;
    viewingAlerts = false;
    document.getElementById('savedToggle').classList.remove('active');
    document.getElementById('alertsToggle').classList.remove('active');
    document.getElementById('goBtn').disabled = true;
    document.getElementById('cancelBtn').hidden = false;
    document.getElementById('watchBtn').hidden = true;
    document.getElementById('planrooms').hidden = false;
    document.getElementById('planrooms').open = false;
    document.getElementById('searchNoteWrap').hidden = true;
    document.getElementById('resultsList').innerHTML = '';
    renderPlanroomLinks(query, location);

    const effectiveLoc = locationForSearch(location);
    const locCtx = effectiveLoc ? ` in ${effectiveLoc}` : ' nationwide';
    setStatus(`Searching bid boards${locCtx} for &ldquo;${escapeHtml(query)}&rdquo;&hellip;`, true);

    const timerInterval = setInterval(()=>{
      const s = Math.floor((Date.now() - startTime) / 1000);
      setStatus(`Searching bid boards${locCtx} for &ldquo;${escapeHtml(query)}&rdquo;&hellip; <span class="elapsed">${s}s</span>`, true);
    }, 1000);

    try{
      let parsed = await searchOnce(query, location, level, signal);
      const notes = [];
      if(parsed.note) notes.push(parsed.note);

      if((parsed.results || []).length === 0){
        const fallbackQuery = deriveFallbackQuery(query);
        if(fallbackQuery.toLowerCase() !== query.trim().toLowerCase()){
          setStatus(`No hits for &ldquo;${escapeHtml(query)}&rdquo; — trying &ldquo;${escapeHtml(fallbackQuery)}&rdquo;&hellip;`, true);
          const parsed2 = await searchOnce(fallbackQuery, location, level, signal);
          if(parsed2.note) notes.push(parsed2.note);
          if((parsed2.results || []).length > 0){ parsed = parsed2; }
        }
      }

      lastResults = (parsed.results || []).map(r=>({...r, matchedTerms:[{term:query, confidence:'direct'}]}));
      const combinedNote = notes.join('  ·  ');

      if(lastResults.length === 0){
        setStatus('No results.', false);
        document.getElementById('planrooms').open = true;
      } else if(parsed._partial){
        setStatus(`${lastResults.length} result${lastResults.length===1?'':'s'} recovered from a cut-off response — try again for a cleaner pass.`, false);
      } else {
        const inText = effectiveLoc ? ` in ${effectiveLoc}` : '';
        setStatus(`${lastResults.length} result${lastResults.length===1?'':'s'} found${inText} · ${new Date().toLocaleTimeString()}`, false);
      }

      if(combinedNote){
        document.getElementById('searchNote').textContent = combinedNote;
        document.getElementById('searchNoteWrap').hidden = false;
      }
      render(lastResults, combinedNote);
    } catch(err){
      if(err.name === 'AbortError'){
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const timedOut = elapsed >= TIMEOUT_MS / 1000 - 1;
        setStatus(timedOut ? 'Search timed out.' : 'Search cancelled.', false);
        document.getElementById('resultsList').innerHTML = timedOut
          ? `<div class="error-state"><h3>Search timed out</h3><p>The search took longer than 20s. Try a simpler or shorter query.</p></div>`
          : `<div class="error-state"><h3>Search cancelled</h3><p>Search was stopped before completing.</p></div>`;
        document.getElementById('planrooms').open = true;
      } else {
        console.error(err);
        document.getElementById('resultsList').innerHTML = `<div class="error-state"><h3>Search didn't go through</h3><p>${escapeHtml(err.message || 'Something went wrong reaching the search service.')} Try again in a moment.</p></div>`;
        setStatus('Search failed.', false);
      }
    } finally {
      clearTimeout(timeoutId);
      clearInterval(timerInterval);
      document.getElementById('cancelBtn').hidden = true;
      document.getElementById('goBtn').disabled = false;
      searchAbortController = null;
      updateWatchBtn();
    }
  }

  document.getElementById('searchForm').addEventListener('submit', (e)=>{
    e.preventDefault();
    const q = document.getElementById('queryInput').value.trim();
    if(!q){
      const wrap = document.getElementById('queryWrap');
      wrap.classList.add('input-error');
      let msg = document.getElementById('queryErrMsg');
      if(!msg){ msg = document.createElement('span'); msg.id = 'queryErrMsg'; msg.className = 'err-msg'; msg.textContent = 'Please enter a search term'; wrap.appendChild(msg); }
      document.getElementById('queryInput').focus();
      document.getElementById('queryInput').addEventListener('input', ()=>{ wrap.classList.remove('input-error'); msg.remove(); }, {once:true});
      return;
    }
    saveFilters();
    search(q, document.getElementById('locationSelect').value, document.getElementById('levelSelect').value);
  });

  // ── Multi-select term state ───────────────────────────────────────────────
  const selectedTerms = new Set();

  function setTermPanel(open){
    const panel = document.getElementById('termPanel');
    const trigger = document.getElementById('termPanelToggle');
    const badge = document.getElementById('termSelBadge');
    const n = selectedTerms.size;
    panel.hidden = !open;
    trigger.setAttribute('aria-expanded', String(open));
    if(!open){
      badge.textContent = n ? `${n}` : '';
      badge.hidden = n === 0;
    } else {
      badge.hidden = true;
    }
  }
  function syncTermToggleLabel(){
    const panel = document.getElementById('termPanel');
    setTermPanel(!panel.hidden);
  }

  function syncTermActionBar(){
    const n = selectedTerms.size;
    const bar = document.getElementById('termActionBar');
    const btn = document.getElementById('termSearchBtn');
    bar.hidden = n === 0;
    btn.textContent = n > 0 ? `Search ${n} term${n > 1 ? 's' : ''}` : '';
    syncTermToggleLabel();
  }

  function syncGroupSelectAll(group){
    const chips = group.querySelectorAll('.chip[data-q]');
    const allSel = [...chips].every(c => selectedTerms.has(c.getAttribute('data-q')));
    const link = group.querySelector('.select-all-link');
    if(link) link.textContent = allSel ? 'deselect all' : 'select all';
  }

  document.getElementById('termBrowser').addEventListener('click', (e)=>{
    // "select all / deselect all" link inside a term-group (NOT the global selectAllTermsBtn)
    const selAllBtn = e.target.closest('.select-all-link');
    if(selAllBtn){
      const group = selAllBtn.closest('.term-group');
      if(!group) return; // global select-all has its own handler; skip here
      const chips = group.querySelectorAll('.chip[data-q]');
      const allSel = [...chips].every(c => selectedTerms.has(c.getAttribute('data-q')));
      chips.forEach(c => {
        const q = c.getAttribute('data-q');
        if(allSel){ selectedTerms.delete(q); c.classList.remove('selected'); }
        else { selectedTerms.add(q); c.classList.add('selected'); }
      });
      syncGroupSelectAll(group);
      syncTermActionBar();
      return;
    }

    const btn = e.target.closest('.chip[data-q]');
    if(!btn) return;

    // Chips inside the panel → toggle selection (no immediate search)
    if(btn.closest('#termPanel')){
      const q = btn.getAttribute('data-q');
      if(selectedTerms.has(q)){ selectedTerms.delete(q); btn.classList.remove('selected'); }
      else { selectedTerms.add(q); btn.classList.add('selected'); }
      syncGroupSelectAll(btn.closest('.term-group'));
      syncTermActionBar();
      return;
    }

    // Quick-pick chips in chip-row → instant single search (original behavior)
    document.getElementById('queryInput').value = btn.getAttribute('data-q');
    saveFilters();
    search(btn.getAttribute('data-q'), document.getElementById('locationSelect').value, document.getElementById('levelSelect').value);
  });

  document.getElementById('termPanelToggle').addEventListener('click', ()=>{

  // ── Concurrency helper ───────────────────────────────────────────────────
  function runConcurrent(items, concurrency, fn) {
    return new Promise(resolve => {
      const n = items.length;
      if(n === 0){ resolve([]); return; }
      const results = new Array(n);
      let nextIdx = 0, doneCount = 0;
      function launchNext(){
        if(nextIdx >= n) return;
        const i = nextIdx++;
        Promise.resolve()
          .then(() => fn(items[i], i))
          .then(r => { results[i] = r; })
          .catch(() => { results[i] = null; })
          .finally(() => {
            doneCount++;
            if(doneCount === n) resolve(results);
            else launchNext();
          });
      }
      for(let k = 0; k < Math.min(concurrency, n); k++) launchNext();
    });
  }

  // ── Per-term batch worker ────────────────────────────────────────────────
  async function runBatchTerm(term, idx, location, level, batchSignal){
    if(batchSignal.aborted) return;
    const TERM_TIMEOUT = 25000;
    const termAC = new AbortController();
    const ttId = setTimeout(() => termAC.abort(), TERM_TIMEOUT);
    batchSignal.addEventListener('abort', () => termAC.abort(), {once:true});
    const sec = batchTermSections[idx];
    try{
      const parsed = await searchOnce(term, location, level, termAC.signal);
      clearTimeout(ttId);
      const newResults = [];
      let duped = 0;
      for(const r of (parsed.results || [])){
        const fp = slugId((r.sourceUrl||'') + (r.title||''));
        if(batchSeen.has(fp)){
          const existing = batchResultsAll.find(p => slugId((p.sourceUrl||'')+(p.title||'')) === fp);
          if(existing){
            if(!existing.matchedTerms) existing.matchedTerms = [];
            existing.matchedTerms.push({term, confidence:'loose'});
          }
          duped++;
        } else {
          batchSeen.add(fp);
          const enriched = {...r, matchedTerms:[{term, confidence:'direct'}]};
          newResults.push(enriched);
          batchResultsAll.push(enriched);
        }
      }
      sec.results = newResults;
      sec.duped = duped;
      sec.failed = false;
    } catch(err){
      clearTimeout(ttId);
      sec.failed = true;
      sec.failMsg = batchSignal.aborted ? 'Cancelled.' : (err.message || 'Unknown error');
    }
    sec.done = true;
  }

  // ── Batch render ─────────────────────────────────────────────────────────
  function renderBatch(sections){
    const container = document.getElementById('resultsList');
    const hasAny = sections.some(s => s.results && s.results.length > 0);
    if(!hasAny && sections.every(s => !s.failed)){
      document.getElementById('colHeaders').hidden = true;
      container.innerHTML = `<div class="empty-state"><h3>No results found</h3><p>None of the selected terms returned matches. Try different terms or a broader location.</p></div>`;
      return;
    }
    let html = '';
    for(const sec of sections){
      html += `<div class="batch-section" data-term="${escapeHtml(sec.term)}">`;
      html += `<div class="batch-section-header">`;
      html += `<span class="batch-term-name">${escapeHtml(sec.term)}</span>`;
      if(sec.failed){
        html += `<span class="batch-fail-msg">search failed · <button type="button" class="retry-btn" data-q="${escapeHtml(sec.term)}">retry</button></span>`;
      } else {
        const n = sec.results ? sec.results.length : 0;
        let countStr = n === 0 ? 'no results' : `${n} result${n !== 1 ? 's' : ''}`;
        if(sec.duped > 0) countStr += ` · ${sec.duped} duplicate${sec.duped !== 1 ? 's' : ''} merged`;
        html += `<span class="batch-count">${countStr}</span>`;
      }
      html += `</div>`;
      if(!sec.failed && sec.results && sec.results.length > 0){
        html += sec.results.map(cardHtml).join('');
      } else if(!sec.failed){
        html += `<p class="batch-no-results">No results for this term.</p>`;
      }
      html += `</div>`;
    }
    container.innerHTML = html;
    document.getElementById('colHeaders').hidden = false;
    container.querySelectorAll('.save-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const project = batchResultsAll.find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id) || savedMap[id];
        if(project) toggleSave(project);
      });
    });
    container.querySelectorAll('.term-tag.more').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.parentElement.querySelectorAll('.tt-hidden').forEach(t => { t.hidden = false; });
        btn.hidden = true;
      });
    });
    container.querySelectorAll('.retry-btn[data-q]').forEach(btn => {
      btn.addEventListener('click', () => retryBatchTerm(btn.getAttribute('data-q')));
    });
  }

  // ── Retry a single failed term ───────────────────────────────────────────
  async function retryBatchTerm(term){
    const idx = batchTermSections.findIndex(s => s.term === term);
    if(idx < 0) return;
    const sec = batchTermSections[idx];
    sec.failed = false; sec.done = false;
    const sectionEl = document.querySelector(`.batch-section[data-term="${CSS.escape(term)}"]`);
    if(sectionEl){
      sectionEl.querySelector('.batch-section-header').innerHTML =
        `<span class="batch-term-name">${escapeHtml(term)}</span><span class="batch-count"><span class="scan" style="display:inline-block;width:10px;height:10px;margin-right:4px;"></span>retrying…</span>`;
    }
    const retryAC = new AbortController();
    await runBatchTerm(term, idx, currentSearchCriteria.location, currentSearchCriteria.level, retryAC.signal);
    lastResults = batchResultsAll;
    const failedCount = batchTermSections.filter(s => s.failed).length;
    const totalDuped = batchTermSections.reduce((sum, s) => sum + (s.duped || 0), 0);
    let statusMsg = `${batchResultsAll.length} result${batchResultsAll.length !== 1 ? 's' : ''} across ${batchTermSections.filter(s => !s.failed).length} of ${batchTermSections.length} terms`;
    if(totalDuped > 0) statusMsg += ` · ${totalDuped} duplicate${totalDuped !== 1 ? 's' : ''} removed`;
    if(failedCount > 0) statusMsg += ` · ${failedCount} failed`;
    setStatus(statusMsg, false);
    renderBatch(batchTermSections);
  }

  // ── Batch search orchestrator ────────────────────────────────────────────
  async function searchBatch(terms, location, level){
    if(batchAbortController) batchAbortController.abort();
    batchAbortController = new AbortController();
    const batchSignal = batchAbortController.signal;
    isBatchMode = true;
    batchResultsAll = [];
    batchSeen = new Set();
    batchTermSections = terms.map(t => ({term:t, results:[], duped:0, failed:false, failMsg:'', done:false}));

    viewingSaved = false; viewingAlerts = false;
    document.getElementById('savedToggle').classList.remove('active');
    document.getElementById('alertsToggle').classList.remove('active');
    document.getElementById('goBtn').disabled = true;
    document.getElementById('cancelBtn').hidden = false;
    document.getElementById('watchBtn').hidden = true;
    document.getElementById('planrooms').hidden = true;
    document.getElementById('searchNoteWrap').hidden = true;
    document.getElementById('resultsList').innerHTML = '';

    const total = terms.length;
    let completedCount = 0;
    setStatus(`Searching ${total} term${total !== 1 ? 's' : ''}… 0/${total} done`, true);

    const CONCURRENCY = 2;
    await runConcurrent(terms, CONCURRENCY, async (term, idx) => {
      await runBatchTerm(term, idx, location, level, batchSignal);
      completedCount++;
      if(!batchSignal.aborted){
        setStatus(`Searching ${total} term${total !== 1 ? 's' : ''}… ${completedCount}/${total} done`, true);
      }
    });

    document.getElementById('cancelBtn').hidden = true;
    document.getElementById('goBtn').disabled = false;
    batchAbortController = null;

    if(batchSignal.aborted){
      setStatus('Batch search cancelled.', false);
      return;
    }

    const successCount = batchTermSections.filter(s => !s.failed).length;
    const failedCount = batchTermSections.filter(s => s.failed).length;
    const totalResults = batchResultsAll.length;
    const totalDuped = batchTermSections.reduce((sum, s) => sum + (s.duped || 0), 0);
    let statusMsg = `${totalResults} result${totalResults !== 1 ? 's' : ''} across ${successCount} of ${total} terms`;
    if(totalDuped > 0) statusMsg += ` · ${totalDuped} duplicate${totalDuped !== 1 ? 's' : ''} removed`;
    if(failedCount > 0) statusMsg += ` · ${failedCount} failed`;
    statusMsg += ` · ${new Date().toLocaleTimeString()}`;
    setStatus(statusMsg, false);

    if(terms.length > 0){
      renderPlanroomLinks(terms[0], location);
      document.getElementById('planrooms').hidden = false;
      document.getElementById('planrooms').open = false;
    }

    lastResults = batchResultsAll;
    renderBatch(batchTermSections);
  }

  /* ================================================================
     Saved Search Alerts
     ================================================================ */

  function alertId(query, location, level){
    return 'a' + slugId(query + '|' + (location||'') + '|' + (level||'all'));
  }
  function resultFingerprint(r){ return slugId((r.sourceUrl||'') + (r.title||'')); }

  /* ---- Storage ---- */
  function loadAlerts(){
    for(let i = 0; i < localStorage.length; i++){
      const key = localStorage.key(i);
      if(key && key.startsWith('bidroute:alert:')){
        try{ const a = JSON.parse(localStorage.getItem(key)); if(a && a.id) alertsMap[a.id] = a; }catch(e){}
      }
    }
    updateAlertsBadge();
  }

  function persistAlert(a){
    try{ localStorage.setItem('bidroute:alert:' + a.id, JSON.stringify(a)); }catch(e){}
  }

  function removeAlert(id){
    delete alertsMap[id];
    localStorage.removeItem('bidroute:alert:' + id);
    updateAlertsBadge();
    if(viewingAlerts) renderAlertsView();
  }

  /* ---- Badge + watch button ---- */
  function updateAlertsBadge(){
    const total = Object.values(alertsMap).reduce((s,a)=>s+(a.newCount||0),0);
    const count = Object.keys(alertsMap).length;
    document.getElementById('alertsCount').textContent = count;
    const badge = document.getElementById('alertsBadge');
    if(total > 0){ badge.textContent = total; badge.hidden = false; }
    else{ badge.hidden = true; }
  }

  function updateWatchBtn(){
    const btn = document.getElementById('watchBtn');
    const {query, location, level} = currentSearchCriteria;
    if(!query || viewingAlerts || viewingSaved){ btn.hidden = true; return; }
    const watching = !!alertsMap[alertId(query, location, level)];
    btn.hidden = false;
    btn.className = 'watch-btn' + (watching ? ' watching' : '');
    btn.textContent = watching ? '★ Watching' : '☆ Watch';
  }

  /* ---- Check logic ---- */
  async function checkAlert(a){
    const ac = new AbortController();
    const tid = setTimeout(()=>ac.abort(), 25000);
    try{
      const parsed = await searchOnce(a.query, a.location, a.level, ac.signal);
      const results = parsed.results || [];
      const newIds = results.map(resultFingerprint);
      if(a.lastCheckedAt === null){
        // First check: establish baseline — nothing counted as "new" yet
        a.newResults = []; a.newCount = 0;
      } else {
        const prev = new Set(a.lastResultIds || []);
        a.newResults = results.filter(r => !prev.has(resultFingerprint(r)));
        a.newCount = a.newResults.length;
      }
      a.lastResultIds = newIds;
      a.lastResults = results;
      a.lastCheckedAt = Date.now();
      persistAlert(a);
      updateAlertsBadge();
      return a.newCount;
    } finally {
      clearTimeout(tid);
    }
  }

  /* ---- Save current search as alert ---- */
  async function saveCurrentSearchAsAlert(){
    const {query, location, level} = currentSearchCriteria;
    if(!query) return;
    const id = alertId(query, location, level);
    if(alertsMap[id]){ updateWatchBtn(); return; }
    const a = {
      id, query, location, level,
      createdAt: Date.now(),
      lastCheckedAt: null,
      lastResultIds: [],
      lastResults: [],
      newResults: [],
      newCount: 0,
      notifyEnabled: false,
    };
    alertsMap[id] = a;
    persistAlert(a);
    updateAlertsBadge();
    updateWatchBtn();
    // Baseline check — seeds lastResultIds so next check can find diffs
    try{ await checkAlert(a); if(viewingAlerts) renderAlertsView(); }catch(e){}
  }

  /* ---- Notification API ---- */
  async function requestNotifyPermission(){
    if(!('Notification' in window)) return false;
    if(Notification.permission === 'granted') return true;
    if(Notification.permission === 'denied') return false;
    return (await Notification.requestPermission()) === 'granted';
  }

  function fireNotification(a, count){
    if(!('Notification' in window) || Notification.permission !== 'granted') return;
    const sub = [locationDisplayNationwide(a.location), a.level !== 'all' ? a.level : ''].filter(Boolean).join(' · ');
    new Notification(`BidRoute: ${count} new result${count>1?'s':''} for "${a.query}"`, {
      body: sub, tag: 'bidroute-' + a.id,
    });
  }

  /* ---- Auto-check stale alerts on load ---- */
  async function checkStaleAlerts(){
    const STALE_MS = 4 * 60 * 60 * 1000; // 4 hours
    const stale = Object.values(alertsMap).filter(a =>
      a.lastCheckedAt === null || Date.now() - a.lastCheckedAt > STALE_MS
    );
    for(const a of stale){
      try{
        const n = await checkAlert(a);
        if(n > 0 && a.notifyEnabled) fireNotification(a, n);
        if(viewingAlerts) renderAlertsView();
      }catch(e){}
    }
  }

  /* ---- Time helpers ---- */
  function relTime(ts){
    if(!ts) return 'Never';
    const m = Math.floor((Date.now()-ts)/60000);
    if(m < 1) return 'Just now';
    if(m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if(h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  }
  function fmtDate(ts){
    if(!ts) return '—';
    return new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  }

  /* ---- Render one alert card ---- */
  function alertCardHtml(a){
    const hasNew = a.newCount > 0;
    const hasResults = (a.lastResults||[]).length > 0;
    const levelLabel = {all:'All levels',federal:'Federal',state:'State/DOT',municipal:'Municipal/County'}[a.level] || a.level;
    const locationLabel = locationDisplayNationwide(a.location);
    const metaParts = [locationLabel, a.level !== 'all' ? levelLabel : ''].filter(Boolean);

    const newSection = hasNew ? `
      <div class="alert-new-results">
        <p class="alert-new-results-label">↑ ${a.newCount} new since last check</p>
        <div class="alert-results-list">${a.newResults.map(cardHtml).join('')}</div>
      </div>` : '';

    const baselineCount = (a.lastResults||[]).length;
    const baselineSection = hasResults ? `
      <details class="alert-baseline-results">
        <summary>${hasNew ? `All ${baselineCount} result${baselineCount===1?'':'s'} from last check` : `${baselineCount} result${baselineCount===1?'':'s'} from last check`}</summary>
        <div class="alert-results-list" style="margin-top:10px">${a.lastResults.map(cardHtml).join('')}</div>
      </details>` : (a.lastCheckedAt ? '<p style="font-size:13px;color:var(--text-muted);margin:10px 0 0">No results found in last check.</p>' : '');

    const neverChecked = !a.lastCheckedAt;

    return `
      <div class="alert-card" data-alert-id="${escapeHtml(a.id)}">
        <div class="alert-card-top">
          <span class="alert-query">"${escapeHtml(a.query)}"</span>
          ${hasNew ? `<span class="new-badge">${a.newCount} new</span>` : ''}
        </div>
        ${metaParts.length ? `<div class="alert-meta-row">${metaParts.map(p=>`<span>${escapeHtml(p)}</span>`).join('')}</div>` : ''}
        <div class="alert-dates">
          Created ${fmtDate(a.createdAt)} ·
          Last checked: ${relTime(a.lastCheckedAt)}
          ${(!neverChecked && baselineCount > 0 && !hasNew) ? ` · ${baselineCount} result${baselineCount===1?'':'s'}` : ''}
        </div>
        <div class="alert-actions">
          <button class="check-btn" data-alert-id="${escapeHtml(a.id)}">↻ Check now</button>
          <button class="notify-toggle-btn ${a.notifyEnabled?'on':''}" data-alert-id="${escapeHtml(a.id)}">${a.notifyEnabled ? '🔔 Notifying' : '🔕 Notify me'}</button>
          <button class="delete-alert-btn" data-alert-id="${escapeHtml(a.id)}">Delete</button>
        </div>
        ${newSection}
        ${baselineSection}
      </div>`;
  }

  function makeSimpleAC(inputEl, items){
    const wrap = inputEl.parentElement;

    drop.className = 'ac-drop';
    wrap.appendChild(drop);
    let activeIdx = -1, cur = [];

    function query(q){
      const ql = q.toLowerCase().replace(/"/g,'');
      const starts = [], contains = [];
      for(const s of items){
        const sl = s.toLowerCase().replace(/"/g,'');
        if(sl.startsWith(ql)) starts.push(s);
        else if(sl.includes(ql)) contains.push(s);
      }
      return [...starts, ...contains].slice(0, 8);
    }

    function setActive(i){
      activeIdx = i;
      drop.querySelectorAll('.ac-item').forEach((el,idx)=>el.classList.toggle('hi',idx===i));
      const hi = drop.querySelectorAll('.ac-item')[i];
      if(hi) hi.scrollIntoView({block:'nearest'});
    }
    function close(){ drop.classList.remove('open'); activeIdx=-1; cur=[]; }
    function select(s){ inputEl.value = s; close(); }

    function renderDrop(results){
      cur = results; activeIdx = -1; drop.innerHTML = '';
      if(!results.length){ close(); return; }
      results.forEach((s,i)=>{
        const li = document.createElement('li');
        li.className = 'ac-item';
        li.textContent = s;
        li.addEventListener('mousedown', e=>{ e.preventDefault(); select(s); });
        li.addEventListener('mouseenter', ()=>setActive(i));
        drop.appendChild(li);
      });
      drop.classList.add('open');
    }

    inputEl.addEventListener('input',()=>{ const q=inputEl.value.trim(); q.length<1?close():renderDrop(query(q)); });
    inputEl.addEventListener('focus',()=>{ const q=inputEl.value.trim(); if(q.length>=1) renderDrop(query(q)); });
    inputEl.addEventListener('blur',()=>setTimeout(close,150));
    inputEl.addEventListener('keydown',e=>{
      if(!drop.classList.contains('open')) return;
      const items=drop.querySelectorAll('.ac-item');
      if(e.key==='ArrowDown'){e.preventDefault();setActive(Math.min(activeIdx+1,items.length-1));}
      else if(e.key==='ArrowUp'){e.preventDefault();setActive(Math.max(activeIdx-1,0));}
      else if(e.key==='Enter'&&activeIdx>=0&&cur[activeIdx]){e.preventDefault();select(cur[activeIdx]);}
      else if(e.key==='Escape'){e.preventDefault();close();}
    });
  }

  function saveFilters(){
    try{
      localStorage.setItem('bidroute:filters', JSON.stringify({
        query:    document.getElementById('queryInput').value.trim(),
        location: document.getElementById('locationSelect').value,
        level:    document.getElementById('levelSelect').value
      }));
    }catch(e){}
  }

  function restoreFilters(){
    try{
      const f = JSON.parse(localStorage.getItem('bidroute:filters') || 'null');
      if(!f) return;
      if(f.query) document.getElementById('queryInput').value = f.query;
      if(f.level) document.getElementById('levelSelect').value = f.level;
      // Restore location; treat empty/missing/city values (old format) as nationwide
      const sel = document.getElementById('locationSelect');
      const savedLoc = f.location || ALL_STATES_VAL;
      sel.value = savedLoc;
      if(sel.value !== savedLoc) sel.value = ALL_STATES_VAL; // value not in options → default
    }catch(e){}
  }

  document.getElementById('cancelBtn').addEventListener('click', ()=>{
    if(batchAbortController) batchAbortController.abort();
    if(searchAbortController) searchAbortController.abort();
  });

  restoreFilters();
  loadSaved();
  loadAlerts();
  makeSimpleAC(document.getElementById('queryInput'), QUERIES);
  const _initQuery = document.getElementById('queryInput').value || 'StreetBond 120';
  const _initLoc   = document.getElementById('locationSelect').value;
  const _initLvl   = document.getElementById('levelSelect').value;
  // After initial search completes, check any alerts not checked in the last 4 hours.
  // Each check costs one API call — no service worker or background polling is used here.
  search(_initQuery, _initLoc, _initLvl).then(()=>checkStaleAlerts());

  /* ── Detail panel ── */
  let detailProject = null;

  function detailHtml(p){
    const isReference = p.type === 'reference_project';
    const id = slugId((p.sourceUrl||'')+(p.title||''));
    const isSaved = !!savedMap[id];
    const status = p.status || 'unknown';
    const statusLabelsDetail = { open:'Open', closing_soon:'Closing soon', closed:'Closed', unknown:'Status unknown' };
    const statusLabel = isReference ? 'Reference project' : (statusLabelsDetail[status] || 'Unknown');

    function field(label, value, mono){
      if(!value || value === '—') return '';
      return `<div class="detail-field">
        <span class="detail-field-label">${escapeHtml(label)}</span>
        <span class="detail-field-value${mono?' mono':''}">${escapeHtml(value)}</span>
      </div>`;
    }

    const tags = (p.matchedTerms||[]).map(t => {
      const color = getTagColor(t.term);
      const style = t.confidence==='direct' ? `style="background:${color.bg};color:${color.text}"` : '';
      return `<span class="term-tag ${escapeHtml(t.confidence||'direct')}" ${style}>${escapeHtml(t.term)}</span>`;
    }).join('');

    return `
      <div class="detail-fields">
        ${field('Agency', p.agency)}
        ${field('Status', statusLabel)}
        ${field('Location', p.location)}
        ${field(isReference ? 'Awarded' : 'Deadline', p.deadline, true)}
        ${field('Estimated value', p.estimatedValue, true)}
      </div>
      ${p.snippet ? `<p class="detail-snippet">${escapeHtml(p.snippet)}</p>` : ''}
      ${tags ? `<div class="term-tags">${tags}</div>` : ''}`;
  }

  function openDetail(project){
    detailProject = project;
    const id = slugId((project.sourceUrl||'')+(project.title||''));
    document.getElementById('detailBody').innerHTML = detailHtml(project);
    document.getElementById('detailAgency').textContent = project.agency || 'Agency not specified';
    document.getElementById('detailTitle').textContent = project.title || 'Untitled solicitation';
    const viewBtn = document.getElementById('detailViewBtn');
    if(project.sourceUrl){ viewBtn.href = project.sourceUrl; viewBtn.hidden = false; }
    else { viewBtn.hidden = true; }
    const saveBtn = document.getElementById('detailSaveBtn');
    const isSaved = !!savedMap[id];
    saveBtn.className = 'detail-save-btn' + (isSaved ? ' saved' : '');
    saveBtn.textContent = isSaved ? '★ Saved' : '☆ Save';
    document.getElementById('detailOverlay').hidden = false;
    document.getElementById('detailPanel').hidden = false;
    document.body.style.overflow = 'hidden';
  }

  function closeDetail(){
    document.getElementById('detailPanel').hidden = true;
    document.getElementById('detailOverlay').hidden = true;
    document.body.style.overflow = '';
    detailProject = null;
  }

  document.getElementById('detailClose').addEventListener('click', closeDetail);
  document.getElementById('detailOverlay').addEventListener('click', closeDetail);
  document.getElementById('detailSaveBtn').addEventListener('click', ()=>{
    if(!detailProject) return;
    toggleSave(detailProject);
    const id = slugId((detailProject.sourceUrl||'')+(detailProject.title||''));
    const isSaved = !!savedMap[id];
    const btn = document.getElementById('detailSaveBtn');
    btn.className = 'detail-save-btn' + (isSaved ? ' saved' : '');
    btn.textContent = isSaved ? '★ Saved' : '☆ Save';
  });

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape' && !document.getElementById('detailPanel').hidden){
      closeDetail();
    }
  });

  document.getElementById('resultsList').addEventListener('click', (e)=>{
    if(e.target.closest('.save-btn') || e.target.closest('.view-link') || e.target.closest('.retry-btn')) return;
    const row = e.target.closest('.result-row');
    if(!row) return;
    const id = row.querySelector('.save-btn')?.getAttribute('data-id');
    if(!id) return;
    const allProjects = isBatchMode ? batchResultsAll : (viewingSaved ? Object.values(savedMap) : lastResults);
    const project = allProjects.find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id)
      || Object.values(savedMap).find(p => slugId((p.sourceUrl||'')+(p.title||'')) === id);
    if(project) openDetail(project);
  });
</script>

<div class="detail-overlay" id="detailOverlay" hidden></div>
<div class="detail-panel" id="detailPanel" hidden>
  <div class="detail-header">
    <div class="detail-title-block">
      <div class="detail-agency" id="detailAgency"></div>
      <div class="detail-title" id="detailTitle"></div>
    </div>
    <button class="detail-close" id="detailClose" aria-label="Close">✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
  <div class="detail-footer">
    <a class="detail-view-btn" id="detailViewBtn" target="_blank" rel="noopener noreferrer">View solicitation ↗</a>
    <button class="detail-save-btn" id="detailSaveBtn">☆ Save</button>
  </div>
</div>

</body>
</html>
